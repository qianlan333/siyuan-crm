name: 缺陷工单
description: 缺陷修复、回归问题、测试失败等场景。
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: symptom
    attributes:
      label: 问题现象
      description: 直接描述出错表现、错误信息、影响范围。
      placeholder: 例如：/api/ops/status 缺少 request_id，contract test 回归失败。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现方式
      description: 写清复现步骤、命令或触发条件。
      placeholder: |
        1. 调用接口
        2. 观察返回体
        3. 运行指定 pytest 用例
    validations:
      required: true
  - type: textarea
    id: authorized_files
    attributes:
      label: 授权修改文件
      description: 逐行列出允许修改的文件。
      placeholder: |
        wecom_ability_service/routes.py
        tests/test_api.py
    validations:
      required: true
  - type: textarea
    id: forbidden_scope
    attributes:
      label: 禁止修改范围
      description: 逐行列出本次不能改的内容。
      placeholder: |
        不改业务 API 路径
        不做 schema 变更
        不动无关模块
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 修复约束
      description: 只写修复必须遵守的边界。
      placeholder: |
        不删旧字段
        不改业务语义
        不加第三方依赖
    validations:
      required: true
  - type: textarea
    id: targeted_tests
    attributes:
      label: 定向测试
      description: 写清必须先跑的测试命令。
      placeholder: |
        python3 -m pytest -q tests/test_api.py::test_xxx
    validations:
      required: true
  - type: textarea
    id: full_regression
    attributes:
      label: 全量回归
      description: 若要求全量，请写出命令。
      placeholder: python3 -m pytest -q
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: 风险说明
      description: 写最可能引入回归的点。
      placeholder: 例如：修复日志上下文后，需确认无请求场景不报错。
    validations:
      required: true
  - type: textarea
    id: rollback
    attributes:
      label: 回滚说明
      description: 用最小语言写出回滚路径。
      placeholder: 回退本次修复涉及文件，并恢复原测试预期。
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交前确认
      options:
        - label: 我已明确复现路径与影响范围
          required: true
        - label: 我已明确授权修改文件范围
          required: true
        - label: 我已明确定向测试与全量回归要求
          required: true
