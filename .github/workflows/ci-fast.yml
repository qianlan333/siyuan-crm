name: CI Fast

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full:
        description: "Force full regression outside required CI"
        required: false
        default: "false"

concurrency:
  group: ci-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.scope.outputs.changed_files }}
      scopes: ${{ steps.scope.outputs.scopes }}
      python_tests: ${{ steps.scope.outputs.python_tests }}
      frontend_tests: ${{ steps.scope.outputs.frontend_tests }}
      needs_postgres: ${{ steps.scope.outputs.needs_postgres }}
      needs_frontend_build: ${{ steps.scope.outputs.needs_frontend_build }}
      needs_full_ci: ${{ steps.scope.outputs.needs_full_ci }}
      force_full: ${{ steps.scope.outputs.force_full }}
      architecture_gate: ${{ steps.scope.outputs.architecture_gate }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (Node 24)
        with:
          fetch-depth: 0

      - name: Select scoped tests
        id: scope
        run: python scripts/ci/select_test_scope.py --github-output "$GITHUB_OUTPUT"

  architecture-gates:
    needs: select
    if: needs.select.outputs.architecture_gate != 'none'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (Node 24)

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (Node 24)
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Run selected architecture gates
        run: bash scripts/ci/run_architecture_gates.sh --mode "${{ needs.select.outputs.architecture_gate }}"

  fast-python-no-pg:
    needs: select
    if: needs.select.outputs.needs_full_ci != 'true' && needs.select.outputs.python_tests != '' && needs.select.outputs.needs_postgres != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (Node 24)

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (Node 24)
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Run scoped Python tests
        env:
          PYTHON_TESTS: ${{ needs.select.outputs.python_tests }}
        run: python -m pytest ${PYTHON_TESTS} -q --tb=short

  fast-python-pg:
    needs: select
    if: needs.select.outputs.needs_full_ci != 'true' && needs.select.outputs.python_tests != '' && needs.select.outputs.needs_postgres == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (Node 24)

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (Node 24)
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Run scoped PostgreSQL Python tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          AICRM_PYTEST_FIXTURE_DEFAULT: "1"
          PYTHON_TESTS: ${{ needs.select.outputs.python_tests }}
        run: python -m pytest ${PYTHON_TESTS} -q --tb=short --timeout=120 --timeout-method=thread

  fast-frontend:
    needs: select
    if: needs.select.outputs.frontend_tests != '' || needs.select.outputs.needs_frontend_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (Node 24)

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (Node 24)
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck and build frontend
        if: needs.select.outputs.needs_frontend_build == 'true'
        run: |
          npm run typecheck
          npm run build:frontend
          git diff --exit-code

      - name: Run scoped frontend tests
        if: needs.select.outputs.frontend_tests != ''
        env:
          FRONTEND_TESTS: ${{ needs.select.outputs.frontend_tests }}
        run: |
          for test_file in ${FRONTEND_TESTS}; do
            node "$test_file"
          done

  dependency-audit:
    needs: select
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (Node 24)

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (Node 24)
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (Node 24)
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install hashed Python lock
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Validate dependency governance
        run: python scripts/ci/check_dependency_security.py

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.lock --require-hashes --progress-spinner=off

      - name: Audit Node dependencies
        run: |
          npm ci
          npm audit --audit-level=high

  full-regression:
    needs: select
    if: needs.select.outputs.needs_full_ci == 'true'
    uses: ./.github/workflows/full-regression.yml
    with:
      run_governance: false

  ci-fast-result:
    needs:
      - select
      - architecture-gates
      - fast-python-no-pg
      - fast-python-pg
      - fast-frontend
      - dependency-audit
      - full-regression
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Required check result
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          SCOPES: ${{ needs.select.outputs.scopes }}
          NEEDS_FULL_CI: ${{ needs.select.outputs.needs_full_ci }}
          ARCHITECTURE_GATE: ${{ needs.select.outputs.architecture_gate }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = [
              f"{name}={job['result']}"
              for name, job in needs.items()
              if job["result"] not in {"success", "skipped"}
          ]
          if (
              os.environ.get("NEEDS_FULL_CI") == "true"
              and needs.get("full-regression", {}).get("result") != "success"
              and not any(item.startswith("full-regression=") for item in failed)
          ):
              failed.append(f"full-regression={needs.get('full-regression', {}).get('result', 'missing')}_but_required")
          print(f"selected_scopes={os.environ.get('SCOPES') or 'none'}")
          print(f"architecture_gate={os.environ.get('ARCHITECTURE_GATE') or 'none'}")
          print(f"needs_full_ci={os.environ.get('NEEDS_FULL_CI') or 'false'}")
          if failed:
              print("Scoped CI failed: " + ", ".join(failed))
              sys.exit(1)
          PY
