name: CI Fast

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full:
        description: "Force full regression outside required CI"
        required: false
        default: "false"

concurrency:
  group: ci-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.scope.outputs.changed_files }}
      scopes: ${{ steps.scope.outputs.scopes }}
      python_tests: ${{ steps.scope.outputs.python_tests }}
      frontend_tests: ${{ steps.scope.outputs.frontend_tests }}
      needs_postgres: ${{ steps.scope.outputs.needs_postgres }}
      needs_frontend_build: ${{ steps.scope.outputs.needs_frontend_build }}
      needs_full_ci: ${{ steps.scope.outputs.needs_full_ci }}
      force_full: ${{ steps.scope.outputs.force_full }}
      architecture_gate: ${{ steps.scope.outputs.architecture_gate }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select scoped tests
        id: scope
        run: python scripts/ci/select_test_scope.py --github-output "$GITHUB_OUTPUT"

  architecture-gates:
    needs: select
    if: needs.select.outputs.architecture_gate != 'none'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run selected architecture gates
        run: bash scripts/ci/run_architecture_gates.sh --mode "${{ needs.select.outputs.architecture_gate }}"

  fast-python-no-pg:
    needs: select
    if: needs.select.outputs.python_tests != '' && needs.select.outputs.needs_postgres != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scoped Python tests
        env:
          PYTHON_TESTS: ${{ needs.select.outputs.python_tests }}
        run: python -m pytest ${PYTHON_TESTS} -q --tb=short

  fast-python-pg:
    needs: select
    if: needs.select.outputs.python_tests != '' && needs.select.outputs.needs_postgres == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare PostgreSQL compatibility database
        run: |
          python - <<'PY'
          import psycopg

          admin_url = "postgresql://test:test@localhost:5432/test"
          default_url = "postgresql://test:test@localhost:5432/aicrm_next"

          with psycopg.connect(admin_url, autocommit=True) as conn:
              role_exists = conn.execute(
                  "SELECT 1 FROM pg_roles WHERE rolname = %s",
                  ("aicrm_next",),
              ).fetchone()
              if role_exists:
                  conn.execute("ALTER ROLE aicrm_next WITH LOGIN PASSWORD 'aicrm_next'")
              else:
                  conn.execute("CREATE ROLE aicrm_next LOGIN PASSWORD 'aicrm_next'")

              db_exists = conn.execute(
                  "SELECT 1 FROM pg_database WHERE datname = %s",
                  ("aicrm_next",),
              ).fetchone()
              if not db_exists:
                  conn.execute("CREATE DATABASE aicrm_next OWNER aicrm_next")

              conn.execute("GRANT ALL PRIVILEGES ON DATABASE test TO aicrm_next")
              conn.execute("GRANT ALL ON SCHEMA public TO aicrm_next")

          with psycopg.connect(default_url, autocommit=True) as conn:
              conn.execute("GRANT ALL ON SCHEMA public TO aicrm_next")
          PY

      - name: Run scoped PostgreSQL Python tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          AICRM_PYTEST_FIXTURE_DEFAULT: "1"
          PYTHON_TESTS: ${{ needs.select.outputs.python_tests }}
        run: python -m pytest ${PYTHON_TESTS} -q --tb=short --timeout=120 --timeout-method=thread

  fast-frontend:
    needs: select
    if: needs.select.outputs.frontend_tests != '' || needs.select.outputs.needs_frontend_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck and build frontend
        if: needs.select.outputs.needs_frontend_build == 'true'
        run: |
          npm run typecheck
          npm run build:frontend
          git diff --exit-code

      - name: Run scoped frontend tests
        if: needs.select.outputs.frontend_tests != ''
        env:
          FRONTEND_TESTS: ${{ needs.select.outputs.frontend_tests }}
        run: |
          for test_file in ${FRONTEND_TESTS}; do
            node "$test_file"
          done

  ci-fast-result:
    needs:
      - select
      - architecture-gates
      - fast-python-no-pg
      - fast-python-pg
      - fast-frontend
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Required check result
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          SCOPES: ${{ needs.select.outputs.scopes }}
          NEEDS_FULL_CI: ${{ needs.select.outputs.needs_full_ci }}
          ARCHITECTURE_GATE: ${{ needs.select.outputs.architecture_gate }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = [
              f"{name}={job['result']}"
              for name, job in needs.items()
              if job["result"] not in {"success", "skipped"}
          ]
          print(f"selected_scopes={os.environ.get('SCOPES') or 'none'}")
          print(f"architecture_gate={os.environ.get('ARCHITECTURE_GATE') or 'none'}")
          print(f"needs_full_ci={os.environ.get('NEEDS_FULL_CI') or 'false'}")
          if failed:
              print("Scoped CI failed: " + ", ".join(failed))
              sys.exit(1)
          PY
