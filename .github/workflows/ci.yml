name: CI

on:
  push:
  pull_request:

jobs:
  full-test:
    # 跑全量 pytest 在真 PG 上。2026-05 砍 SQLite 后所有测试统一用 PG。
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all tests (PG-only, parallel)
        # ``-n auto`` 让 pytest-xdist 按 CPU 核数派发 test 到 worker 子进程；
        # conftest._resolve_worker_database_url 给每个 worker 路由到独立 PG DB
        # ``test_<worker_id>``。CI runner 默认 4 vCPU → ~4 worker 并行。
        run: python -m pytest tests/ -n auto --dist=loadfile -v --tb=short --timeout=120 --timeout-method=thread
        timeout-minutes: 45
