name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly full regression at 02:00 Asia/Shanghai.
    - cron: "0 18 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-smoke:
    # PR 阶段只跑 broadcast queue 相关 smoke，
    # 全量 PG 回归留给 nightly 和手动触发。
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PR smoke tests (PG-only, targeted)
        run: |
          python -m pytest \
            tests/test_broadcast_jobs_service.py \
            tests/test_run_broadcast_queue_worker.py \
            tests/test_broadcast_jobs_wecom_private_dispatch.py \
            -n auto --dist=loadfile -q --tb=short --timeout=120 --timeout-method=thread
        timeout-minutes: 15

  main-smoke:
    # main push 只跑 broadcast queue 关键路径 smoke，避免每次部署都被全量回归卡 6-8 分钟。
    # 全量 ``pytest tests/`` 仍由 nightly / workflow_dispatch 负责。
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main smoke tests (PG-only, targeted)
        run: |
          python -m pytest \
            tests/test_broadcast_jobs_service.py \
            tests/test_run_broadcast_queue_worker.py \
            tests/test_broadcast_jobs_wecom_private_dispatch.py \
            -n auto --dist=loadfile -q --tb=short --timeout=120 --timeout-method=thread
        timeout-minutes: 15

  full-test:
    # 跑全量 pytest 在真 PG 上。2026-05 砍 SQLite 后所有测试统一用 PG。
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all tests (PG-only, parallel)
        # ``-n auto`` 让 pytest-xdist 按 CPU 核数派发 test 到 worker 子进程；
        # conftest._resolve_worker_database_url 给每个 worker 路由到独立 PG DB
        # ``test_<worker_id>``。CI runner 默认 4 vCPU → ~4 worker 并行。
        run: python -m pytest tests/ -n auto --dist=loadfile -v --tb=short --timeout=120 --timeout-method=thread
        timeout-minutes: 45
