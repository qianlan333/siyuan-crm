name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI Fast"]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            set -o pipefail
            cd '/home/ubuntu/极简 crm'
            if ! git diff --quiet || ! git diff --cached --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
              git stash push --include-untracked -m "deploy-backup-$(date -u +%Y%m%dT%H%M%SZ)"
            fi
            before_sha="$(git rev-parse HEAD)"
            git fetch origin main:refs/remotes/origin/main
            git reset --hard refs/remotes/origin/main
            after_sha="$(git rev-parse HEAD)"
            printf '%s\n' "$after_sha" > .release-sha
            python3 scripts/ops/ensure_ai_audience_external_api_env.py /home/ubuntu/.openclaw-wecom-pg.env
            set -a
            source /home/ubuntu/.openclaw-wecom-pg.env
            set +a
            test -n "${DATABASE_URL:-}"
            source /home/ubuntu/venvs/openclaw/bin/activate
            if [ "$before_sha" = "$after_sha" ] || git diff --quiet "$before_sha" "$after_sha" -- requirements.txt; then
              echo "requirements.txt unchanged; skipping pip install"
            else
              pip install -r requirements.txt
            fi
            python3 app.py health
            # Alembic migration（真实执行 DDL；不要 stamp 跳过 schema 变更）
            python3 -m alembic upgrade head
            if [ -f scripts/ensure_channel_multi_staff_schema.py ]; then
              python3 scripts/ensure_channel_multi_staff_schema.py
            else
              echo "scripts/ensure_channel_multi_staff_schema.py not present; skipping"
            fi
            # Identity preflight must fail before any runtime unit is stopped.
            python3 scripts/ops/check_unionid_identity_cutover.py \
              --phase preflight \
              --register-existing-conflicts \
              --expected-release-sha "$after_sha" \
              | tee /tmp/aicrm-identity-preflight.json
            sudo systemctl restart openclaw-wecom-postgres.service
            for _ in $(seq 1 20); do
              if curl -sSf http://127.0.0.1:5001/health; then
                break
              fi
              sleep 0.5
            done
            curl -sSf http://127.0.0.1:5001/health
            python3 scripts/ops/check_unionid_identity_cutover.py \
              --phase post-deploy \
              --expected-release-sha "$after_sha" \
              | tee /tmp/aicrm-identity-reconciliation.json
            admin_channels_status="$(curl -sS -o /tmp/aicrm_channels_smoke.json -w "%{http_code}" http://127.0.0.1:5001/api/admin/channels?limit=1)"
            if [ "$admin_channels_status" != "200" ] && [ "$admin_channels_status" != "401" ] && [ "$admin_channels_status" != "403" ]; then
              cat /tmp/aicrm_channels_smoke.json
              exit 1
            fi
            if ! python scripts/ops/check_admin_read_pages_smoke.py --base-url http://127.0.0.1:5001 --require-admin-cookie | tee /tmp/aicrm-admin-read-pages-smoke.json; then
              sudo systemctl status openclaw-wecom-postgres.service --no-pager || true
              sudo journalctl -u openclaw-wecom-postgres.service -n 120 --no-pager || true
              exit 1
            fi
