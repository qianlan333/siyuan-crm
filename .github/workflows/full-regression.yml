name: Full Regression

on:
  workflow_call:
    inputs:
      run_governance:
        description: "Run dependency and architecture governance inside this workflow"
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      run_governance:
        description: "Run dependency and architecture governance"
        required: false
        type: boolean
        default: true
  schedule:
    # Nightly full regression at 02:00 Asia/Shanghai.
    - cron: "0 18 * * *"

concurrency:
  group: full-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-governance:
    if: github.event_name == 'schedule' || inputs.run_governance == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Audit Python dependencies
        run: |
          python scripts/ci/check_dependency_security.py
          python -m pip_audit -r requirements.lock --require-hashes --progress-spinner=off

      - name: Run full architecture gates
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: bash scripts/ci/run_architecture_gates.sh --mode full

  full-python-shard:
    name: full-python shard ${{ matrix.shard_label }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - shard_index: 0
            shard_label: 1-of-4
          - shard_index: 1
            shard_label: 2-of-4
          - shard_index: 2
            shard_label: 3-of-4
          - shard_index: 3
            shard_label: 4-of-4
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.5"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Select balanced pytest shard
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          AICRM_PYTEST_FIXTURE_DEFAULT: "1"
          SHARD_INDEX: ${{ matrix.shard_index }}
        run: |
          set -o pipefail
          python scripts/ci/select_pytest_shard.py \
            --shard-index "$SHARD_INDEX" \
            --shard-total 4 \
            --duration-baseline docs/ci/pytest_duration_baseline.json \
            --output-file "$RUNNER_TEMP/pytest-shard-files.txt" \
            | tee "$RUNNER_TEMP/pytest-shard-summary.json"

      - name: Run full pytest shard
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          AICRM_PYTEST_FIXTURE_DEFAULT: "1"
          SHARD_INDEX: ${{ matrix.shard_index }}
        run: |
          pytest_files=()
          while IFS= read -r test_file; do
            pytest_files+=("$test_file")
          done < "$RUNNER_TEMP/pytest-shard-files.txt"
          if [ "${#pytest_files[@]}" -eq 0 ]; then
            echo "selected pytest shard is empty"
            exit 1
          fi
          mkdir -p test-results
          python -m pytest "${pytest_files[@]}" -n auto --dist=loadfile -q \
            --tb=short \
            --timeout=120 \
            --timeout-method=thread \
            --junitxml="test-results/python-shard-${SHARD_INDEX}.xml" \
            --durations=25 \
            --durations-min=1.0

      - name: Upload pytest shard evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-python-shard-${{ matrix.shard_label }}
          path: |
            test-results/python-shard-${{ matrix.shard_index }}.xml
            ${{ runner.temp }}/pytest-shard-summary.json
          if-no-files-found: warn
          retention-days: 14

  full-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Run full frontend regression
        run: |
          npm ci
          npm audit --audit-level=high
          npm run typecheck
          npm run build:frontend
          git diff --exit-code
          npm run test:frontend:all
