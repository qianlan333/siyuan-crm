name: Promote to Production (Manual)

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Exact 40-character SHA already verified on id-dev
        required: true
        type: string
      confirmation:
        description: Type DEPLOY 150.158.82.186 to request production approval
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: aicrm-production-promotion
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout requested release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (Node 24)
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0

      - name: Verify manual confirmation, main ancestry, and test release
        run: |
          set -e
          set -o pipefail
          requested_sha="${{ inputs.release_sha }}"
          confirmation="${{ inputs.confirmation }}"
          if [ "$confirmation" != "DEPLOY 150.158.82.186" ]; then
            echo "production confirmation does not match the required target"
            exit 1
          fi
          if ! printf '%s' "$requested_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "release_sha must be a full 40-character commit SHA"
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$requested_sha" ]; then
            echo "checked out release does not match requested production release"
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$requested_sha" FETCH_HEAD; then
            echo "requested production release is not part of ID-refactor main"
            exit 1
          fi
          curl -sSf -D /tmp/aicrm_test_release_headers.txt \
            https://id-dev.youcangogogo.com/health \
            -o /tmp/aicrm_test_release.json
          test_release_sha="$(awk 'tolower($1) == "x-aicrm-release-sha:" {print $2}' \
            /tmp/aicrm_test_release_headers.txt | tr -d '\r' | tail -n 1)"
          if [ "$test_release_sha" != "$requested_sha" ]; then
            echo "test release sha does not match requested production release"
            exit 1
          fi

  promote:
    needs: validate
    uses: ./.github/workflows/deploy.yml
    with:
      target_environment: production
      release_sha: ${{ inputs.release_sha }}
    secrets: inherit
