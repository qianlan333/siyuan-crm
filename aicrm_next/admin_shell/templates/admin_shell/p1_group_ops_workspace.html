{% extends "admin_shell/base.html" %}

{% block content %}
<section class="p1-workspace-page" data-route-owner="ai_crm_next" data-page-purpose="ts_native_group_ops_workspace">
  <section class="admin-card p1-workspace-page-intro">
    <div>
      <h2>P1 Native Group Ops Workspace</h2>
      <p>这是新的 TS-native 交互工作台壳，不是诊断页，也不是 legacy Group Ops 页面顶部补丁。</p>
    </div>
    <span class="p1-closure-pill p1-closure-pill--warning">draft-only / preview-only</span>
  </section>

  <section id="p1GroupOpsWorkspaceApp" aria-label="P1 native group ops workspace">
    <div class="admin-card p1-workspace-loading" data-real-external-call-executed="false" data-production-write-executed="false" data-can-claim-pass90="false">
      加载 P1 Native workspace preview；不会发送、不审批、不写生产。
    </div>
  </section>
  <script id="p1GroupOpsWorkspaceApiConfig" type="application/json">
    {
      "plansUrl": "/api/admin/automation-conversion/group-ops/plans?limit=8",
      "planDetailBaseUrl": "/api/admin/automation-conversion/group-ops/plans/",
      "planGroupsSuffix": "/groups",
      "planNodesSuffix": "/nodes",
      "planExecutionsBaseUrl": "/api/automation/group-ops/plans/",
      "pushCenterJobsUrl": "/api/admin/push-center/jobs?section=group_ops&limit=8"
    }
  </script>
</section>
