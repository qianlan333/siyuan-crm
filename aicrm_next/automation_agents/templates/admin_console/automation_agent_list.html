{% extends "admin_console/base.html" %}

{% block head_extra %}
<style>
  :root {
    --agent-bg: #f4f7fb;
    --agent-card: #ffffff;
    --agent-line: #e4ebf5;
    --agent-line2: #d7e1ef;
    --agent-text: #0f172a;
    --agent-muted: #64748b;
    --agent-blue: #2563eb;
    --agent-blue2: #eaf2ff;
    --agent-green: #16a34a;
    --agent-green-bg: #dcfce7;
    --agent-red: #dc2626;
    --agent-red-bg: #fff1f2;
    --agent-shadow: 0 18px 50px rgba(15, 23, 42, .08);
    --agent-radius: 18px;
    --agent-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }

  .automation-agent-page {
    max-width: 1740px;
    margin: 0 auto;
    padding: 0 0 28px;
    color: var(--agent-text);
  }

  .automation-agent-card {
    overflow: hidden;
    border: 1px solid var(--agent-line);
    border-radius: var(--agent-radius);
    background: var(--agent-card);
    box-shadow: var(--agent-shadow);
  }

  .automation-agent-list-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 32px 36px;
    border-bottom: 1px solid var(--agent-line);
  }

  .automation-agent-list-top__left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .automation-agent-list-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    margin-left: auto;
  }

  .automation-agent-title {
    margin: 0;
    font-size: 30px;
    font-weight: 950;
    letter-spacing: 0;
    line-height: 1.1;
  }

  .automation-agent-btn {
    min-height: 40px;
    border: 1px solid var(--agent-line2);
    border-radius: 12px;
    background: #fff;
    color: #1e293b;
    cursor: pointer;
    font: inherit;
    font-weight: 800;
    padding: 10px 16px;
    white-space: nowrap;
    box-shadow: 0 1px 0 rgba(15, 23, 42, .02);
  }

  .automation-agent-btn:hover {
    border-color: #bfd0e8;
    background: #f8fbff;
  }

  .automation-agent-btn.primary {
    border-color: var(--agent-blue);
    background: var(--agent-blue);
    color: #fff;
    box-shadow: 0 8px 18px rgba(37, 99, 235, .22);
  }

  .automation-agent-btn.danger {
    border-color: #fecaca;
    background: #fff7f7;
    color: var(--agent-red);
  }

  .automation-agent-btn.sm {
    min-height: 38px;
    padding: 9px 14px;
    border-radius: 12px;
    font-size: 14px;
  }

  .automation-agent-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border-radius: 999px;
    background: #edf2f8;
    color: #475569;
    font-weight: 800;
    padding: 7px 12px;
    white-space: nowrap;
  }

  .automation-agent-pill.green {
    background: var(--agent-green-bg);
    color: var(--agent-green);
  }

  .automation-agent-pill.gray {
    background: #f2f4f7;
    color: #475467;
  }

  .automation-agent-table-wrap {
    overflow-x: hidden;
  }

  .automation-agent-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .automation-agent-table th {
    height: 68px;
    border-bottom: 1px solid var(--agent-line);
    background: #f8fafc;
    color: #718096;
    font-size: 15px;
    font-weight: 900;
    text-align: left;
  }

  .automation-agent-table td {
    height: 148px;
    border-bottom: 1px solid var(--agent-line);
    vertical-align: middle;
  }

  .automation-agent-table tr:last-child td {
    border-bottom: 0;
  }

  .automation-agent-table th,
  .automation-agent-table td {
    padding: 0 28px;
  }

  .automation-agent-table .w-plan {
    width: 36%;
  }

  .automation-agent-table .w-type {
    width: 14%;
  }

  .automation-agent-table .w-material {
    width: 18%;
  }

  .automation-agent-table .w-status {
    width: 12%;
  }

  .automation-agent-table .w-op {
    width: 20%;
    text-align: right;
  }

  .automation-agent-plan-title {
    font-size: 18px;
    font-weight: 950;
    letter-spacing: 0;
  }

  .automation-agent-plan-key {
    margin-top: 6px;
    color: #66758e;
    font-family: var(--agent-mono);
    font-size: 14px;
    font-weight: 800;
    overflow-wrap: anywhere;
  }

  .automation-agent-op-row {
    display: inline-flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    white-space: nowrap;
  }

  .automation-agent-empty {
    display: none;
    padding: 44px;
    color: var(--agent-muted);
    text-align: center;
    font-weight: 800;
  }

  .automation-agent-toast {
    position: fixed;
    right: 22px;
    bottom: 22px;
    z-index: 30;
    border-radius: 14px;
    background: #0f172a;
    color: #fff;
    font-weight: 900;
    padding: 13px 16px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, .25);
    opacity: 0;
    transform: translateY(10px);
    transition: .2s;
  }

  .automation-agent-toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 1100px) {
    .automation-agent-table-wrap {
      overflow-x: auto;
    }

    .automation-agent-table {
      min-width: 1040px;
      table-layout: auto;
    }

    .automation-agent-table th,
    .automation-agent-table td {
      height: auto;
      padding: 16px;
    }

    .automation-agent-op-row {
      flex-wrap: wrap;
    }
  }
</style>
{% endblock %}

{% block content %}
<main class="automation-agent-page" data-automation-agent-list-page>
  <section class="automation-agent-card" aria-label="自动化话术">
    <div class="automation-agent-list-top">
      <div class="automation-agent-list-top__left">
        <h2 class="automation-agent-title">自动化列表</h2>
      </div>
      <div class="automation-agent-list-actions">
        <button class="automation-agent-btn primary" id="createAgent" type="button">新增 Agent</button>
        <button class="automation-agent-btn primary" id="createFixedScript" type="button">新增固定话术</button>
      </div>
    </div>
    <div class="automation-agent-table-wrap">
      <table class="automation-agent-table">
        <thead>
          <tr>
            <th class="w-plan">自动化名称</th>
            <th class="w-type">自动化类类型</th>
            <th class="w-material">固定素材</th>
            <th class="w-status">状态</th>
            <th class="w-op">操作</th>
          </tr>
        </thead>
        <tbody id="agentTableBody">
          <tr><td class="automation-agent-empty" colspan="5">加载中</td></tr>
        </tbody>
      </table>
    </div>
    <div class="automation-agent-empty" id="emptyRow">暂无自动化话术。</div>
  </section>
</main>
<div class="automation-agent-toast" id="agentToast">已保存</div>
{% endblock %}

{% block scripts_extra %}
<script>
  (() => {
    const apiUrl = {{ automation_agents_api_url | tojson }};
    const rowsEl = document.getElementById("agentTableBody");
    const emptyEl = document.getElementById("emptyRow");
    const createBtn = document.getElementById("createAgent");
    const createFixedBtn = document.getElementById("createFixedScript");
    const toastEl = document.getElementById("agentToast");
    let items = [];

    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    })[char]);

    const toast = (message) => {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      window.setTimeout(() => toastEl.classList.remove("show"), 1500);
    };

    const fetchJson = async (url, options = {}) => {
      const headers = { Accept: "application/json", ...(options.headers || {}) };
      if (options.body && typeof options.body !== "string") {
        headers["Content-Type"] = "application/json";
      }
      const response = await fetch(url, {
        credentials: "same-origin",
        cache: "no-store",
        ...options,
        headers,
        body: options.body && typeof options.body !== "string" ? JSON.stringify(options.body) : options.body,
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.ok === false) {
        throw new Error(payload.error || payload.detail || `HTTP ${response.status}`);
      }
      return payload;
    };

    const materialText = (summary) => {
      const value = summary && typeof summary === "object" ? summary : {};
      return `${Number(value.image_count || 0)} 图片 / ${Number(value.miniprogram_count || 0)} 小程序 / ${Number(value.attachment_count || 0)} PDF`;
    };

    const statusPill = (status) => {
      if (status === "active") return '<span class="automation-agent-pill green">启用中</span>';
      if (status === "archived") return '<span class="automation-agent-pill gray">已归档</span>';
      return '<span class="automation-agent-pill">已停止</span>';
    };

    const automationTypeLabel = (item) => {
      if (item.automation_type === "fixed_script") return "固定话术";
      return item.automation_type_label || "agent";
    };

    const editPath = (id) => `/admin/automation-agents/${encodeURIComponent(id)}/edit`;

    const render = () => {
      emptyEl.style.display = items.length ? "none" : "block";
      if (!items.length) {
        rowsEl.innerHTML = "";
        return;
      }
      rowsEl.innerHTML = items.map((item, index) => {
        const agentName = item.agent_name || item.agent_code || "未命名 Agent";
        const agentCode = item.agent_code || "-";
        const isActive = item.status === "active";
        return `
          <tr>
            <td class="w-plan">
              <div class="automation-agent-plan-title">${escapeHtml(agentName)}</div>
              <div class="automation-agent-plan-key">${escapeHtml(agentCode)}</div>
            </td>
            <td class="w-type"><span class="automation-agent-pill">${escapeHtml(automationTypeLabel(item))}</span></td>
            <td class="w-material"><span class="automation-agent-pill">${escapeHtml(materialText(item.fixed_material_summary))}</span></td>
            <td class="w-status">${statusPill(item.status)}</td>
            <td class="w-op">
              <div class="automation-agent-op-row" data-agent-action-row>
                <button class="automation-agent-btn sm" type="button" data-action="edit" data-index="${index}">编辑</button>
                <button class="automation-agent-btn sm" type="button" data-action="copy" data-index="${index}">复制</button>
                <button class="automation-agent-btn sm" type="button" data-action="${isActive ? "pause" : "activate"}" data-index="${index}">${isActive ? "停止" : "启用"}</button>
                <button class="automation-agent-btn sm danger" type="button" data-action="delete" data-index="${index}">删除</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    };

    const loadAgents = async () => {
      rowsEl.innerHTML = '<tr><td class="automation-agent-empty" colspan="5" style="display:table-cell">加载中</td></tr>';
      try {
        const payload = await fetchJson(`${apiUrl}?_=${Date.now()}`);
        items = Array.isArray(payload.items) ? payload.items : [];
        render();
      } catch (_error) {
        rowsEl.innerHTML = '<tr><td class="automation-agent-empty" colspan="5" style="display:table-cell">加载失败，请稍后重试</td></tr>';
      }
    };

    const runAction = async (item, action) => {
      if (action === "edit") {
        window.location.href = editPath(item.id);
        return;
      }
      if (action === "delete" && !window.confirm(`确认删除「${item.agent_name || item.agent_code || "Agent"}」？`)) {
        return;
      }
      const actionUrls = {
        copy: `${apiUrl}/${encodeURIComponent(item.id)}/copy`,
        pause: `${apiUrl}/${encodeURIComponent(item.id)}/pause`,
        activate: `${apiUrl}/${encodeURIComponent(item.id)}/activate`,
        delete: `${apiUrl}/${encodeURIComponent(item.id)}`,
      };
      await fetchJson(actionUrls[action], { method: action === "delete" ? "DELETE" : "POST" });
      toast(action === "copy" ? "已复制 Agent" : action === "delete" ? "已删除" : action === "pause" ? "已停止" : "已启用");
      await loadAgents();
    };

    rowsEl.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const item = items[Number(button.dataset.index)];
      if (!item) return;
      button.disabled = true;
      try {
        await runAction(item, button.dataset.action);
      } catch (error) {
        window.alert(error.message || "操作失败");
      } finally {
        button.disabled = false;
      }
    });

    const createAutomation = async (type) => {
      const suffix = String(Date.now());
      const fixedScript = type === "fixed_script";
      createBtn.disabled = true;
      createFixedBtn.disabled = true;
      try {
        const payload = await fetchJson(apiUrl, {
          method: "POST",
          body: {
            agent_name: fixedScript ? "新建固定话术" : "新建 Agent",
            agent_code: fixedScript ? `fixed_script_${suffix}` : `new_agent_${suffix}`,
            automation_type: fixedScript ? "fixed_script" : "agent",
            bound_package_key: "new_package_key",
            role_prompt: fixedScript ? "" : "你是一个克制、自然、面向私域转化的跟进 Agent。",
            task_prompt: fixedScript ? "" : `请根据{{ '{{问卷信息}}' }}，生成一条适合在用户填完问卷后直接发送的跟进话术。

输出要求：
1. 只输出最终话术，不要解释过程，不要输出 JSON。
2. 话术必须保留下面的整体结构和自然语气：

收到问卷啦～

现在已经可以开始体验了，我也会把你拉进群，后续日课更新会在群里同步。

结合你刚才填的情况，我建议你可以先从这几个问题开始聊：
- [根据问卷信息推荐的具体问题 1]
- [根据问卷信息推荐的具体问题 2]
- [根据问卷信息推荐的具体问题 3]

你先从最真实、最具体的一个问题开始聊，体验通常会更好。

3. “这几个问题开始聊”后面必须输出 3 个问题，用短横线列表。
4. 这 3 个问题要根据问卷信息明细推荐，优先覆盖用户最明确的痛点、目标、卡点、身份阶段或业务场景。
5. 每个问题都要像用户可以直接拿来问 AI 的真实问题，具体、口语化、可行动。
6. 不要编造问卷里没有依据的具体行业、身份或金额信息；信息不足时，用更通用但仍然可开始对话的问题。`,
            status: "active",
            fixed_content_package: {
              content_text: "",
              image_library_ids: [],
              miniprogram_library_ids: [],
              attachment_library_ids: [],
            },
          },
        });
        window.location.href = editPath(payload.agent.id);
      } catch (error) {
        window.alert(error.message || "创建失败");
      } finally {
        createBtn.disabled = false;
        createFixedBtn.disabled = false;
      }
    };

    createBtn.addEventListener("click", () => createAutomation("agent"));
    createFixedBtn.addEventListener("click", () => createAutomation("fixed_script"));

    loadAgents();
  })();
</script>
{% endblock %}
