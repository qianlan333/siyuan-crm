{% set workspace = operations_workspace or {} %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin_console/material_picker.css') }}?v=send-content-preview-ux-20260527">
<link rel="stylesheet" href="{{ url_for('static', filename='admin_console/send_content_composer.css') }}?v=send-content-preview-ux-20260527">
<style>
  .op-task-workspace { display: grid; grid-template-columns: minmax(300px, 340px) minmax(0, 1fr); gap: 16px; align-items: start; min-width: 0; }
  .op-task-card, .op-task-panel { border: 1px solid rgba(15,23,42,.08); border-radius: 16px; background: #fff; min-width: 0; }
  .op-task-panel { display: grid; gap: 16px; padding: 0; border: 0; background: transparent; }
  .op-task-panel[hidden], .op-task-empty[hidden] { display: none !important; }
  .op-task-card__head { display: grid; gap: 12px; padding: 16px; border-bottom: 1px solid rgba(15,23,42,.06); }
  .op-task-card__head h2, .op-task-section h3 { margin: 0; color: #1f2329; }
  .op-task-sidebar { display: grid; gap: 12px; padding: 14px; max-height: calc(100vh - 220px); overflow: auto; }
  .op-task-tools { display: grid; gap: 10px; }
  .op-task-tools__row, .op-task-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .op-task-button { border: 1px solid rgba(15,23,42,.12); border-radius: 10px; background: #f8fafc; color: #1f2329; padding: 9px 12px; font-weight: 800; cursor: pointer; }
  .op-task-button.is-primary { border-color: #2563eb; background: #2563eb; color: #fff; }
  .op-task-button.is-soft { border-color: rgba(37,99,235,.18); background: #eef4ff; color: #1456f0; }
  .op-task-button:disabled { opacity: .6; cursor: wait; }
  .op-task-list { display: grid; gap: 10px; }
  .op-task-group { display: grid; gap: 8px; }
  .op-task-group__title { color: #667085; font-size: 13px; font-weight: 900; }
  .op-task-item { display: grid; gap: 10px; padding: 12px; border: 1px solid rgba(15,23,42,.08); border-radius: 14px; background: #fff; text-align: left; }
  .op-task-item.is-active { border-color: rgba(37,99,235,.42); background: #f7fbff; box-shadow: 0 0 0 3px rgba(37,99,235,.08); }
  .op-task-item__top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
  .op-task-item strong { color: #1f2329; }
  .op-task-badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 9px; background: #f2f4f7; color: #344054; font-size: 12px; font-weight: 800; white-space: nowrap; }
  .op-task-badge.is-active { background: #ecfdf3; color: #067647; }
  .op-task-badge.is-draft { background: #eef4ff; color: #1456f0; }
  .op-task-section { display: grid; gap: 14px; padding: 16px; border: 1px solid rgba(15,23,42,.08); border-radius: 16px; background: #fff; min-width: 0; }
  .op-task-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  .op-task-grid--three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .op-task-grid--wide { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .op-task-field { display: grid; gap: 6px; min-width: 0; }
  .op-task-field > span { color: #667085; font-size: 13px; font-weight: 900; }
  .op-task-field input, .op-task-field select, .op-task-field textarea, .op-task-control { width: 100%; padding: 11px 12px; border: 1px solid rgba(15,23,42,.12); border-radius: 10px; background: #fff; color: #111827; font: inherit; }
  .op-task-field textarea { min-height: 88px; resize: vertical; }
  .op-task-mode-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
  .op-task-mode { display: grid; place-items: center; min-height: 64px; padding: 12px; border: 1px solid rgba(15,23,42,.10); border-radius: 14px; background: #fff; font-weight: 900; cursor: pointer; text-align: center; }
  .op-task-mode.is-active { border-color: rgba(37,99,235,.42); background: #eef4ff; color: #1456f0; }
  .op-task-preview { display: inline-flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; background: #f8fbff; color: #344054; font-weight: 800; }
  .op-task-strategy-panel { display: grid; gap: 14px; border: 1px solid rgba(15,23,42,.08); border-radius: 14px; background: #fbfdff; padding: 14px; }
  .op-task-strategy-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .op-task-strategy-head h4 { margin: 0; color: #1f2329; font-size: 16px; }
  .op-task-muted { color: #667085; font-size: 13px; line-height: 1.55; }
  .op-task-segments { display: grid; gap: 12px; }
  .op-task-segment { display: grid; gap: 10px; padding: 12px; border: 1px solid rgba(15,23,42,.08); border-radius: 14px; background: #fff; }
  .op-task-segment-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center; }
  .op-task-empty { display: grid; place-items: center; min-height: 220px; color: #667085; border: 1px dashed rgba(15,23,42,.16); border-radius: 16px; background: #fff; text-align: center; padding: 20px; }
  .op-task-chip { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 5px 9px; background: #eef4ff; color: #1456f0; font-size: 12px; font-weight: 800; }
  .op-task-feedback { display: none; padding: 12px 14px; border-radius: 12px; background: #fef2f2; color: #991b1b; font-weight: 700; }
  .op-task-feedback.is-success { background: #ecfdf3; color: #166534; }
  @media (max-width: 960px) {
    .op-task-workspace, .op-task-grid, .op-task-grid--three, .op-task-grid--wide, .op-task-mode-grid, .op-task-segment-row { grid-template-columns: 1fr; }
    .op-task-sidebar { max-height: none; }
  }
</style>

<section class="op-task-workspace" data-operation-task-root data-program-id="{{ workspace.program_id or '' }}" data-api-urls='{{ (workspace.api_urls or {})|tojson }}'>
  <aside class="op-task-card">
    <div class="op-task-card__head">
      <h2>运营任务</h2>
      <div class="op-task-tools">
        <select class="op-task-control" data-group-filter aria-label="分组筛选"></select>
        <input class="op-task-control" data-task-search placeholder="搜索任务标题" aria-label="搜索任务标题">
        <div class="op-task-tools__row">
          <button class="op-task-button is-primary" type="button" data-create-task>新增任务</button>
          <button class="op-task-button is-soft" type="button" data-create-group>新增分组</button>
          <button class="op-task-button" type="button" data-delete-group>删除分组</button>
        </div>
      </div>
      <div class="op-task-feedback" data-task-list-feedback></div>
    </div>
    <div class="op-task-sidebar">
      <div class="op-task-list" data-task-list></div>
    </div>
  </aside>

  <div class="op-task-panel" data-task-editor>
    <div class="op-task-feedback" data-task-feedback></div>
    <div class="op-task-empty" data-task-empty>还没有运营任务</div>
    <div class="op-task-panel" data-task-form hidden>
      <section class="op-task-section">
        <div class="op-task-strategy-head">
          <h3>任务基础信息</h3>
          <button class="op-task-button is-primary" type="button" data-save-task>保存任务</button>
        </div>
        <div class="op-task-grid">
          <label class="op-task-field"><span>任务名称</span><input data-field="task_name"></label>
          <label class="op-task-field"><span>所属分组</span><select data-field="group_id"></select></label>
          <label class="op-task-field"><span>状态</span><select data-field="status"><option value="draft">草稿</option><option value="active">启用</option><option value="paused">停用</option></select></label>
          <label class="op-task-field" style="grid-column: 1 / -1;"><span>任务说明</span><textarea data-field="description"></textarea></label>
        </div>
      </section>

      <section class="op-task-section">
        <h3>触发与对象</h3>
        <div class="op-task-grid op-task-grid--wide">
          <label class="op-task-field">
            <span>触发方式</span>
            <select data-field="trigger_type">
              <option value="scheduled_daily">每天固定时间触发</option>
              <option value="audience_entered">进入人群后立即触发</option>
            </select>
          </label>
          <label class="op-task-field"><span>每天触发时间</span><input data-field="send_time" data-scheduled-trigger-field type="time"></label>
          <label class="op-task-field">
            <span>目标人群所在阶段</span>
            <select data-field="target_stage_code">
              <option value="pending_questionnaire" data-audience-code="pending_questionnaire">待填问卷 · 尚未完成问卷</option>
              <option value="operating" data-audience-code="operating">运营中 · 已通过前置条件</option>
              <option value="converted" data-audience-code="converted">已转化 · 已确认成交</option>
            </select>
          </label>
          <label class="op-task-field"><span>进入人群第 N 天</span><input data-field="audience_day_offset" data-scheduled-trigger-field type="number" min="1" step="1"></label>
          <label class="op-task-field" style="grid-column: 1 / -1;">
            <span>行为过滤</span>
            <select data-field="behavior_filter">
              <option value="none">不过滤</option>
              <option value="lt_2">消息少于 2</option>
              <option value="between_2_9">消息 2-9</option>
              <option value="gte_10">消息大于等于 10</option>
            </select>
          </label>
        </div>
        <div class="op-task-actions">
          <div class="op-task-preview">命中人数：<strong data-preview-total>-</strong></div>
          <button class="op-task-button is-soft" type="button" data-preview-audience>刷新命中人数</button>
        </div>
        <div class="op-task-muted" data-preview-reasons></div>
      </section>

      <section class="op-task-section">
        <h3>内容模式</h3>
        <div class="op-task-mode-grid" data-content-modes>
          <button class="op-task-mode" type="button" data-mode="unified">统一内容</button>
          <button class="op-task-mode" type="button" data-mode="profile_layered">按画像分层群发</button>
          <button class="op-task-mode" type="button" data-mode="behavior_layered">按消息数分层群发</button>
          <button class="op-task-mode" type="button" data-mode="agent">Agent 改写 / 个性化</button>
        </div>
        <div class="op-task-strategy-panel" data-strategy-panel></div>
      </section>
    </div>
  </div>
</section>

<script defer src="{{ url_for('static', filename='admin_console/material_picker.js') }}?v=send-content-preview-ux-20260527"></script>
<script defer src="{{ url_for('static', filename='admin_console/send_content_composer.js') }}?v=send-content-preview-ux-20260527"></script>
<script defer src="/static/automation-engine/admin_console/automation_operation_orchestration_panel.js?v=send-content-preview-ux-20260527"></script>
