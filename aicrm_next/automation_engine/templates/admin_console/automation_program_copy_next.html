{% extends "admin_console/base.html" %}

{% block head_extra %}
<style>
  .copy-panel { display: grid; gap: 18px; max-width: 860px; padding: 22px; border: 1px solid rgba(15,23,42,.08); border-radius: 12px; background: #fff; }
  .copy-panel h2 { margin: 0; color: #111827; }
  .copy-muted { margin: 0; color: #64748b; line-height: 1.7; }
  .copy-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
  .copy-field { display: grid; gap: 7px; }
  .copy-field span { color: #475569; font-size: 13px; font-weight: 800; }
  .copy-field input { width: 100%; padding: 12px 14px; border: 1px solid rgba(15,23,42,.14); border-radius: 10px; background: #fff; font-size: 15px; }
  .copy-actions { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
  .copy-action { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; padding: 0 18px; border: 1px solid rgba(37,99,235,.18); border-radius: 10px; background: #eef4ff; color: #1456f0; font-weight: 800; text-decoration: none; cursor: pointer; }
  .copy-action.is-primary { background: #2563eb; color: #fff; box-shadow: 0 10px 22px rgba(37,99,235,.18); }
  @media (max-width: 760px) { .copy-grid { grid-template-columns: 1fr; } }
</style>
{% endblock %}

{% block content %}
{% set source = copy_source_program or {} %}
<form class="copy-panel" method="post" action="{{ copy_action }}">
  <input type="hidden" name="admin_action_token" value="{{ admin_action_token }}">
  <div>
    <h2>复制自动化运营方案</h2>
    <p class="copy-muted">来源：{{ source.program_name or "自动化运营方案" }}。复制后会生成新的草稿方案，只迁移配置，不迁移成员、执行记录和运行日志。</p>
  </div>
  <div class="copy-grid">
    <label class="copy-field">
      <span>新方案名称</span>
      <input name="program_name" value="{{ source.program_name or '自动化运营方案' }} 副本" required>
    </label>
    <label class="copy-field">
      <span>新方案编码</span>
      <input name="program_code" value="{{ source.program_code or 'program' }}_copy" required>
    </label>
  </div>
  <div class="copy-actions">
    <a class="copy-action" href="{{ cancel_href }}">取消</a>
    <button class="copy-action is-primary" type="submit">确认复制</button>
  </div>
</form>
{% endblock %}
