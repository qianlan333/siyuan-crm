{% extends "admin_console/base.html" %}

{% block head_extra %}
<style>
  .orders-admin {
    display: grid;
    gap: 18px;
  }

  .orders-card-body {
    display: grid;
    gap: 16px;
  }

  .orders-filter-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px 16px;
  }

  .orders-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .orders-field span {
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .orders-field input,
  .orders-field select {
    min-height: 42px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fffdf8;
    color: var(--text);
  }

  .orders-table {
    min-width: 1180px;
  }

  .orders-summary,
  .orders-muted,
  .orders-toast {
    color: var(--muted);
  }

  .orders-toast,
  .orders-summary {
    min-height: 22px;
    font-weight: 700;
  }

  .orders-mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    font-weight: 800;
  }

  .orders-strong {
    font-weight: 800;
  }

  .orders-sub {
    margin-top: 4px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }

  .orders-pill {
    display: inline-flex;
    align-items: center;
    min-height: 26px;
    padding: 4px 10px;
    border-radius: 999px;
    background: #eef2f7;
    color: #475569;
    font-size: 12px;
    font-weight: 800;
  }

  .orders-pill.paid {
    background: #e7f8ee;
    color: #0f7a43;
  }

  .orders-pill.pending {
    background: #fff4d6;
    color: #8a5a00;
  }

  .orders-pill.refund_processing {
    background: #f3e8ff;
    color: #9333ea;
  }

  .orders-pill.partial_refunded,
  .orders-pill.full_refunded {
    background: #e7efff;
    color: #1d4ed8;
  }

  .orders-empty {
    display: none;
    min-height: 120px;
    padding: 28px;
    border: 1px dashed var(--line-strong);
    border-radius: var(--radius-md);
    color: var(--muted);
    text-align: center;
    font-weight: 800;
  }

  .orders-empty.is-visible {
    display: grid;
    place-items: center;
  }

  .orders-pager {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  @media (max-width: 1100px) {
    .orders-filter-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 760px) {
    .orders-filter-grid,
    .orders-pager {
      grid-template-columns: 1fr;
      align-items: stretch;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="orders-admin" data-next-commerce-admin="unified-orders">
  <section class="admin-card">
    <div class="admin-card-head">
      <div>
        <h2>筛选</h2>
        <p>按支付渠道、订单号、商品、手机号和状态筛选订单。</p>
      </div>
      <div class="admin-form-actions">
        <button class="admin-button admin-button--primary" id="searchBtn" type="button">查询</button>
        <button class="admin-button admin-button--secondary" id="exportBtn" type="button">导出筛选结果</button>
        <button class="admin-button admin-button--ghost" id="resetBtn" type="button">重置</button>
      </div>
    </div>
    <div class="orders-card-body">
      <div class="orders-filter-grid">
        <label class="orders-field" for="provider"><span>支付渠道</span><select id="provider">{% for item in provider_options %}<option value="{{ item.value }}">{{ item.label }}</option>{% endfor %}</select></label>
        <label class="orders-field" for="orderNo"><span>订单号</span><input id="orderNo" placeholder="微信单号 / 支付宝单号 / 小店订单号"></label>
        <label class="orders-field" for="mobile"><span>手机号</span><input id="mobile" placeholder="输入手机号"></label>
        <label class="orders-field" for="product"><span>商品编码</span><input id="product" placeholder="subscription_trial_month"></label>
        <label class="orders-field" for="createdFrom"><span>订单创建开始</span><input id="createdFrom" type="datetime-local" value="{{ default_filters.created_from }}"></label>
        <label class="orders-field" for="createdTo"><span>订单创建结束</span><input id="createdTo" type="datetime-local" value="{{ default_filters.created_to }}"></label>
        <label class="orders-field" for="status"><span>状态</span><select id="status"><option value="">全部</option>{% for item in status_options %}<option value="{{ item.value }}">{{ item.label }}</option>{% endfor %}</select></label>
      </div>
      <div class="orders-toast" id="notice"></div>
    </div>
  </section>

  <section class="admin-card">
    <div class="admin-card-head">
      <div>
        <h2>订单列表</h2>
        <p class="orders-summary" id="summary">正在加载订单...</p>
      </div>
      <div class="admin-form-actions">
        <select class="admin-button" id="limit" aria-label="每页条数"><option value="20">每页 20 条</option><option value="50">每页 50 条</option><option value="100">每页 100 条</option></select>
        <button class="admin-button admin-button--ghost" id="refreshBtn" type="button">刷新</button>
      </div>
    </div>
    <div class="orders-card-body">
      <div class="admin-table-wrap">
        <table class="admin-table orders-table">
          <thead><tr><th>创建时间</th><th>微信/平台单号</th><th>付款人 / 客户身份</th><th>商品名</th><th>金额</th><th>状态</th><th>支付渠道</th><th>操作</th></tr></thead>
          <tbody id="rows">
            <tr><td colspan="8" class="orders-muted">正在加载订单...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="orders-empty" id="empty">暂无符合条件的订单。</div>
      <div class="orders-pager">
        <div class="orders-muted" id="pageHint">服务端分页。</div>
        <div class="admin-form-actions"><button class="admin-button admin-button--ghost" id="prevBtn" type="button">上一页</button><button class="admin-button admin-button--secondary" id="nextBtn" type="button">下一页</button></div>
      </div>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts_extra %}
<script>
  const listApiUrl = {{ list_api_url|tojson }};
  const exportApiUrl = {{ export_api_url|tojson }};
  const state = {offset: 0, total: 0, limit: 20};
  const $ = (id) => document.getElementById(id);
  const esc = (value) => String(value || "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  function filters() {
    return {
      provider: $("provider").value,
      order_no: $("orderNo").value,
      mobile: $("mobile").value,
      product_code: $("product").value,
      created_from: $("createdFrom").value,
      created_to: $("createdTo").value,
      status: $("status").value
    };
  }

  function params() {
    const out = new URLSearchParams();
    Object.entries(filters()).forEach(([key, value]) => { if (String(value || "").trim()) out.set(key, value); });
    out.set("limit", $("limit").value || "20");
    out.set("offset", String(state.offset));
    return out;
  }

  function renderLoading() {
    $("rows").innerHTML = '<tr><td colspan="8" class="orders-muted">正在加载订单...</td></tr>';
    $("empty").classList.remove("is-visible");
  }

  function payerName(row) {
    const customer = row.customer || {};
    return row.payer_name || customer.name || "未记录付款人";
  }

  function customerIdentityLine(row) {
    const customer = row.customer || {};
    const mobile = row.mobile || customer.mobile || "未记录手机号";
    const identity = row.userid || row.external_userid || row.unionid || customer.userid || customer.external_userid || customer.unionid || "-";
    return `${mobile} · ${identity}`;
  }

  function render(items) {
    $("rows").innerHTML = items.map((row) => `<tr>
      <td>${esc(row.created_at)}</td>
      <td><span class="orders-mono">${esc(row.merchant_order_no || row.out_trade_no || row.order_no)}</span><div class="orders-sub">${esc(row.platform_transaction_no || row.transaction_id || "")}</div></td>
      <td><div class="orders-strong">${esc(payerName(row))}</div><div class="orders-sub">${esc(customerIdentityLine(row))}</div></td>
      <td>${esc(row.product_name)}</td>
      <td class="orders-mono">¥${esc(row.amount_yuan)}</td>
      <td><span class="orders-pill ${esc(row.status)}">${esc(row.status_label)}</span></td>
      <td>${esc(row.provider_label || row.provider)}</td>
      <td><a class="admin-button admin-button--ghost" href="${esc(row.detail_url)}">查看详情</a></td>
    </tr>`).join("");
    $("empty").classList.toggle("is-visible", !items.length);
  }

  async function load() {
    $("summary").textContent = "正在加载订单...";
    renderLoading();
    const response = await fetch(`${listApiUrl}?${params().toString()}`);
    const data = await response.json();
    if (!data.ok) {
      $("summary").textContent = data.error || data.detail || "加载失败";
      render([]);
      return;
    }
    state.total = data.total || 0;
    state.limit = data.limit || Number($("limit").value || 20);
    render(data.items || []);
    $("summary").textContent = `当前页 ${(data.items || []).length} 条 / 筛选结果 ${state.total} 条`;
    $("pageHint").textContent = `第 ${Math.floor(state.offset / state.limit) + 1} 页`;
    $("prevBtn").disabled = state.offset <= 0;
    $("nextBtn").disabled = !data.has_more;
  }

  function resetPage() { state.offset = 0; load(); }
  $("searchBtn").addEventListener("click", resetPage);
  $("refreshBtn").addEventListener("click", load);
  $("limit").addEventListener("change", resetPage);
  $("provider").addEventListener("change", resetPage);
  $("resetBtn").addEventListener("click", () => {
    ["orderNo","mobile","product","status"].forEach((id) => { $(id).value = ""; });
    $("provider").value = "all";
    resetPage();
  });
  $("prevBtn").addEventListener("click", () => { state.offset = Math.max(0, state.offset - state.limit); load(); });
  $("nextBtn").addEventListener("click", () => { state.offset += state.limit; load(); });
  $("exportBtn").addEventListener("click", async () => {
    $("notice").textContent = "正在生成导出文件...";
    const response = await fetch(exportApiUrl, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({resource: "orders", filters: filters(), format: "csv"})});
    if (!response.ok) { $("notice").textContent = "导出失败"; return; }
    const data = await response.json();
    if (!data.ok) { $("notice").textContent = data.message || "导出失败"; return; }
    const result = await fetch(data.job.download_url);
    const exported = await result.json();
    const blob = new Blob([exported.content_text || ""], {type: "text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url; link.download = "orders.csv"; link.click();
    URL.revokeObjectURL(url);
    $("notice").textContent = "导出文件已生成。";
  });
  load();
</script>
{% endblock %}
