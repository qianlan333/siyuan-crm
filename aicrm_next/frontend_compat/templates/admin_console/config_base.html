{% extends "admin_console/base.html" %}

{% block content %}
<section class="admin-card admin-module-banner">
  <div class="admin-section-header admin-section-header--compact">
    <div>
      <div class="admin-eyebrow">配置中心</div>
      <h2>统一后台配置模式</h2>
      <p class="admin-muted">当前统一采用「列表 + 编辑区 / 抽屉」的后台模式，保留现有接口语义与写入逻辑。</p>
    </div>
  </div>
  <nav class="admin-subnav" aria-label="配置导航">
    {% for item in config_tabs %}
    <a class="admin-subnav-link{% if item.active %} is-active{% endif %}" href="{{ item.href }}">{{ item.label }}</a>
    {% endfor %}
  </nav>
</section>

<div class="config-stack">
  {% block config_content %}{% endblock %}
</div>
{% endblock %}
