<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>已经提交</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f2f3f5;
      --panel: rgba(255,255,255,0.98);
      --line: #dee0e3;
      --text: #1f2329;
      --muted: #8f959e;
      --primary: #3370ff;
      --soft: #ebf2ff;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
      font-family: "PingFang SC", "Helvetica Neue", -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(51, 112, 255, 0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(51, 112, 255, 0.06), transparent 24%),
        var(--bg);
      color: var(--text);
    }
    .card {
      width: min(100%, 460px);
      padding: 40px 28px;
      text-align: center;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    h1 {
      margin: 18px 0 0;
      font-size: clamp(32px, 8vw, 40px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }
    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }
    .lead-qr {
      display: grid;
      justify-items: center;
      gap: 12px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }
    .lead-qr img {
      width: min(260px, 72vw);
      aspect-ratio: 1;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 10px;
    }
    .lead-qr strong { font-size: 17px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">问卷提交状态</div>
    <h1>已经提交</h1>
    <p>感谢填写</p>
    {% if lead_qr %}
    <section class="lead-qr" aria-label="提交后渠道二维码">
      <strong>{{ lead_qr.channel_name or "扫码继续" }}</strong>
      <img src="{{ lead_qr.qr_url }}" alt="{{ lead_qr.channel_name or '渠道' }}二维码" onerror="this.closest('.lead-qr').remove()">
      <p>长按识别二维码，继续后续服务</p>
    </section>
    {% endif %}
  </main>
</body>
</html>
