<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客户侧边栏 V2 工作台</title>
  <link rel="stylesheet" href="/static/sidebar_workbench/sidebar_workbench.css?v=20260709-periodic-product-tabs">
</head>
<body>
  <div
    class="wrap"
    id="sidebar-workbench-root"
    data-debug-enabled="{{ 'true' if debug_enabled else 'false' }}"
    data-workbench-url="/api/sidebar/v2/workbench"
    data-profile-url="/api/sidebar/v2/profile"
    data-questionnaires-url="/api/sidebar/v2/questionnaires"
    data-products-url="/api/sidebar/v2/products"
    data-orders-url="/api/sidebar/v2/orders"
    data-periodic-orders-url="/api/sidebar/v2/periodic-orders"
    data-periodic-order-remark-url="/api/sidebar/v2/periodic-orders"
    data-materials-url="/api/sidebar/v2/materials"
    data-material-send-url="/api/sidebar/v2/materials/send"
    data-other-staff-messages-url="/api/sidebar/v2/other-staff-messages"
    data-bind-mobile-url="/api/sidebar/bind-mobile"
    data-jssdk-config-url="/api/sidebar/jssdk-config"
  >
    <div class="top">
      <section class="profile-card" aria-label="客户信息">
        <div class="profile-main">
          <div class="identity">
            <div class="name-row">
              <div class="name" id="customer-name">识别中</div>
              <span class="phone-state loading" id="binding-state">加载中...</span>
            </div>
            <div class="meta" id="customer-mobile"></div>
            <div class="meta" id="customer-external-userid"></div>
            <div class="workflow" id="workflow-title"></div>
          </div>
          <button class="btn change" id="change-mobile-button" type="button">换手机号</button>
        </div>
      </section>

      <nav class="tabs" id="tabs" aria-label="侧边栏模块"></nav>
    </div>

    <main id="content" class="content">
      <section class="panel">
        <div class="status">正在识别当前客户…</div>
      </section>
    </main>
  </div>

  <div class="modal hidden" id="mobile-modal" role="dialog" aria-modal="true" aria-labelledby="mobile-modal-title">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="mobile-modal-title">更换手机号</h2>
        <button class="icon-btn" id="close-mobile-modal" type="button" aria-label="关闭">×</button>
      </div>
      <label class="modal-field">
        <span>手机号</span>
        <input id="mobile-input" inputmode="numeric" autocomplete="tel" maxlength="20" placeholder="请输入 11 位手机号">
      </label>
      <div class="modal-actions">
        <button class="btn ghost" id="cancel-mobile-button" type="button">取消</button>
        <button class="btn primary" id="confirm-mobile-button" type="button">保存</button>
      </div>
      <div class="status" id="mobile-status"></div>
    </div>
  </div>

  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>
  <div id="debug-wrap" class="hidden"></div>

  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<script src="/static/sidebar_workbench/sidebar_workbench.js?v=20260713-huangyoucan-usage"></script>
</body>
</html>
