<style>
.internal-events-page { --ie-line: #e5e7eb; --ie-muted: #6b7280; --ie-primary: #2563eb; --ie-success: #059669; --ie-warning: #d97706; --ie-danger: #dc2626; --ie-blocked: #7c3aed; }

.internal-events-stat { padding: 14px; }
.internal-events-stat-label { font-size: 12px; color: var(--ie-muted); margin-bottom: 8px; }
.internal-events-stat-value { font-size: 22px; font-weight: 700; }
.internal-events-layout { display: block; }
.internal-events-main { overflow: hidden; }
.internal-events-card-head { padding: 14px 16px; border-bottom: 1px solid var(--ie-line); display: flex; justify-content: space-between; gap: 12px; align-items: center; }
.internal-events-card-title { font-weight: 700; font-size: 15px; }
.internal-events-muted { color: var(--ie-muted); }
.internal-events-tabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px; border-bottom: 1px solid var(--ie-line); background: #fafafa; }
.internal-events-tab { border: 1px solid var(--ie-line); background: #fff; border-radius: 999px; padding: 7px 12px; font-size: 13px; cursor: pointer; color: #1f2937; }
.internal-events-tab.active { background: var(--ie-primary); color: #fff; border-color: var(--ie-primary); }
.internal-events-filters { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--ie-line); }
.internal-events-field { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--ie-muted); }
.internal-events-field input, .internal-events-field select { height: 36px; border: 1px solid var(--ie-line); border-radius: 8px; padding: 0 10px; background: #fff; font-size: 13px; color: #1f2937; min-width: 0; }
.internal-events-table-wrap { overflow-x: auto; }
.internal-events-table { table-layout: fixed; min-width: 1040px; }
.internal-events-col-event { width: 190px; }
.internal-events-col-type { width: 150px; }
.internal-events-col-object { width: 210px; }
.internal-events-col-source { width: 190px; }
.internal-events-col-consumers { width: 170px; }
.internal-events-col-time { width: 130px; }
.internal-events-table th, .internal-events-table td { vertical-align: top; }
.internal-events-table tbody tr[data-event-id] { cursor: pointer; }
.internal-events-table tbody tr[data-event-id]:hover td { background: #f9fafb; }
.internal-events-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; }

.internal-events-time { min-width: 118px; white-space: nowrap; }

.internal-events-counts { display: flex; gap: 6px; flex-wrap: wrap; }
.internal-events-chip { border: 1px solid var(--ie-line); border-radius: 999px; padding: 2px 7px; font-size: 12px; color: #374151; background: #fff; }
.internal-events-chip.placeholder { color: var(--ie-muted); background: #f9fafb; }
.internal-events-modal { position: fixed; inset: 0; display: none; z-index: 1000; }

.internal-events-kv { display: grid; grid-template-columns: 120px minmax(0, 1fr); gap: 8px 10px; font-size: 13px; margin-bottom: 10px; }
.internal-events-kv-key { color: var(--ie-muted); }

.internal-events-consumer-hint { margin-top: 5px; color: var(--ie-muted); font-size: 12px; line-height: 1.35; }

</style>

    const p = new URLSearchParams();
    Object.entries(params).forEach(([k, v]) => {
      if (v !== undefined && v !== null && String(v).trim() !== "") p.set(k, v);
    });
    return p.toString();
  }

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function labelFor(map, value) {
    return map[value] || value || "-";
  }

  function ellipsis(value, className = "") {
    return `<span class="internal-events-ellipsis ${className}" title="${escapeHtml(value || "-")}">${escapeHtml(value || "-")}</span>`;
  }

  function oneLine(value, className = "") {
    return `<div class="internal-events-single-line ${className}" title="${escapeHtml(value || "-")}">${escapeHtml(value || "-")}</div>`;
  }

  function formatBeijingTime(value) {
    if (!value) return { date: "-", time: "北京时间" };
    const parsed = new Date(value);
    if (Number.isNaN(parsed.getTime())) return { date: String(value), time: "北京时间" };
    const parts = new Intl.DateTimeFormat("zh-CN", {
      timeZone: "Asia/Shanghai",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    }).formatToParts(parsed).reduce((acc, part) => {
      if (part.type !== "literal") acc[part.type] = part.value;
      return acc;
    }, {});
    return { date: `${parts.year}-${parts.month}-${parts.day}`, time: `${parts.hour}:${parts.minute}:${parts.second}` };
  }

  function beijingTimeCell(value) {
    const formatted = formatBeijingTime(value);
    return `
      <div class="internal-events-time" title="${escapeHtml(`${formatted.date} ${formatted.time} 北京时间`)}">
        <div class="internal-events-time-date">${escapeHtml(formatted.date)}</div>
        <div class="internal-events-time-clock">${escapeHtml(formatted.time)}</div>
      </div>
    `;
  }

  function eventLabel(item) {
    return labelFor(EVENT_TYPE_LABELS, item.event_type);
  }

  function eventSectionLabel(item) {
    return EVENT_SECTION_LABELS[item.event_type] || labelFor(AGGREGATE_TYPE_LABELS, item.aggregate_type) || "其他";
  }

  function businessObjectLabel(item) {
    const typeLabel = labelFor(AGGREGATE_TYPE_LABELS, item.aggregate_type);
    const id = item.aggregate_id || "";
    return id ? `${typeLabel} ${id}` : typeLabel;
  }

  function subjectLabel(item) {
    const typeLabel = labelFor(SUBJECT_TYPE_LABELS, item.subject_type);
    const id = item.subject_id || "";
    return id ? `${typeLabel} ${id}` : typeLabel;
  }

  function sourceLabel(item) {
    const moduleLabel = labelFor(SOURCE_MODULE_LABELS, item.source_module);
    return item.source_route ? `${moduleLabel} · ${item.source_route}` : moduleLabel;
  }

  function statusLabel(status) {
    return STATUS_LABELS[status] || status || "-";
  }

  function consumerLabel(name) {
    return CONSUMER_LABELS[name] || name || "-";
  }

  function badge(status) {
    return `<span class="internal-events-badge ${escapeHtml(status || "")}">${escapeHtml(statusLabel(status))}</span>`;
  }

  function categoryLabel(category) {
    return WHY_PENDING_CATEGORY_LABELS[category] || category || "-";
  }

  function categoryTag(category) {
    return `<span class="internal-events-category-tag">${escapeHtml(categoryLabel(category))}</span>`;
  }

  function reconciliationStateMap(reconciliation) {
    return Object.fromEntries((reconciliation.consumer_states || []).map(item => [item.consumer_name, item]));
  }

  function whyPendingForRun(run, stateMap) {
    return ((stateMap[run.consumer_name] || {}).why_pending) || {
      category: "normal_pending",
      message: "等待 reconciliation 数据",
      actionable: true
    };
  }

  function renderEffectCard(effect) {
    const reusedText = effect.reused ? "true" : "false";
    const createdText = effect.created ? "true" : "false";
    const realCallText = effect.real_external_call_executed ? "true" : "false";
    return `
      <div class="effect-card">
        <div>External Effect Job: ${escapeHtml(effect.job_id || effect.id || "-")}</div>
        <div>effect_type: ${escapeHtml(effect.effect_type || "-")}</div>
        <div>job_status: ${escapeHtml(effect.job_status || effect.status || "-")}</div>
        <div>execution_mode: ${escapeHtml(effect.execution_mode || "-")}</div>
        <div>source: ${escapeHtml(effect.source || "-")}</div>
        <div>reused: ${escapeHtml(reusedText)}</div>
        <div>created: ${escapeHtml(createdText)}</div>
        <div>real_external_call_executed: ${escapeHtml(realCallText)}</div>
        <div>blocked_reason: ${escapeHtml(effect.blocked_reason || "-")}</div>
      </div>
    `;
  }

  function renderConsumerReconciliationRow(state) {
    const why = state.why_pending || {};
    const category = why.category || "";
    const rowClass = category === "placeholder_not_configured" ? "placeholder" : (state.status || "");
    return `
      <div class="consumer-row ${escapeHtml(rowClass)}" title="${escapeHtml(why.message || "")}">
        <span>${escapeHtml(consumerLabel(state.consumer_name))}</span>
        ${badge(state.status)}
        ${categoryTag(category)}
        <span class="hint">未执行原因：${escapeHtml(why.message || "-")}</span>
      </div>
    `;
  }

  function renderPlaceholderConsumers(states) {
    const placeholders = states.filter(state => ((state.why_pending || {}).category === "placeholder_not_configured"));
    if (!placeholders.length) return "";
    return `
      <details class="internal-events-placeholder-details" open>
        <summary>Placeholder Consumers (not actionable)</summary>
        <div class="consumer-table internal-events-placeholder-consumers">
          ${placeholders.map(renderConsumerReconciliationRow).join("")}
        </div>
      </details>
    `;
  }

  function renderReconciliationPanel(reconciliation) {
    const effects = reconciliation.external_effects || [];
    const states = reconciliation.consumer_states || [];
    return `
      <div class="event-reconciliation-panel">
        <h2>业务效果核对</h2>
        ${effects.length ? effects.map(renderEffectCard).join("") : `
          <div class="effect-card">
            <div>External Effect Job: -</div>
            <div>job_status: -</div>
            <div>execution_mode: -</div>
            <div>reused: false</div>
            <div>real_external_call_executed: false</div>
          </div>
        `}
        <div class="consumer-table">
          ${states.length ? states.map(renderConsumerReconciliationRow).join("") : `<div class="internal-events-muted">暂无 reconciliation consumer 状态</div>`}
        </div>
        ${renderPlaceholderConsumers(states)}
        <div class="summary-box">derived_status: ${escapeHtml(reconciliation.derived_status || "-")}</div>
      </div>
    `;
  }

  async function readJson(response) {
    try { return await response.json(); } catch (_) { return {}; }
  }

  function openDetailModal() {
    const modal = document.getElementById("detailModal");
    modal.classList.add("is-open");
    modal.setAttribute("aria-hidden", "false");
  }

  function closeDetailModal() {
    const modal = document.getElementById("detailModal");
    modal.classList.remove("is-open");
    modal.setAttribute("aria-hidden", "true");
  }

  async function loadEvents() {
    const response = await fetch(`/api/admin/internal-events?${qs({ event_section: state.section, limit: 50, ...state.filters })}`);
    const data = await readJson(response);
    const counts = data.counts || {};
    document.querySelector('[data-stat="total"]').textContent = counts.total ?? data.total ?? 0;
    document.querySelector('[data-stat="due"]').textContent = counts.due ?? 0;
    document.querySelector('[data-stat="rollout_gated"]').textContent = counts.rollout_gated ?? 0;
    document.querySelector('[data-stat="failed_retryable"]').textContent = counts.failed_retryable ?? 0;
    document.querySelector('[data-stat="failed_terminal"]').textContent = counts.failed_terminal ?? 0;
    document.getElementById("totalText").textContent = `共 ${data.total || 0} 条`;

    const items = data.items || [];
    const tbody = document.getElementById("eventsTbody");
    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="admin-empty-cell">暂无事件</td></tr>`;
      return;
    }
    tbody.innerHTML = items.map(item => {
      const summary = item.reconciliation_summary || {};
      const unresolved = Number(summary.unresolved_consumer_count ?? item.pending_count ?? 0), rolloutGated = Number(summary.rollout_gated_consumer_count ?? 0);
      const placeholder = Number(summary.placeholder_consumer_count ?? 0);
      return `
        <tr data-event-id="${escapeHtml(item.event_id)}">
          <td>${oneLine(eventLabel(item), "internal-events-strong")}</td>
          <td>${oneLine(eventSectionLabel(item), "internal-events-strong")}</td>
          <td>${oneLine(businessObjectLabel(item), "internal-events-mono")}</td>
          <td>${oneLine(sourceLabel(item), "internal-events-strong")}</td>
          <td>
            <div class="internal-events-counts">
              <span class="internal-events-chip">总 ${Number(item.consumer_total || 0)}</span>
              <span class="internal-events-chip">成 ${Number(item.succeeded_count || 0)}</span>
              <span class="internal-events-chip">败 ${Number(item.failed_count || 0)}</span>
              <span class="internal-events-chip">跳 ${Number(item.skipped_count || 0)}</span>
              <span class="internal-events-chip">业务待办 ${unresolved}</span><span class="internal-events-chip">灰度 ${rolloutGated}</span>
              <span class="internal-events-chip placeholder">占位 ${placeholder}</span>
            </div>
          </td>
          <td>${beijingTimeCell(item.occurred_at || item.created_at)}</td>
        </tr>
      `;
    }).join("");
    tbody.querySelectorAll("tr[data-event-id]").forEach(row => {
      row.addEventListener("click", () => loadDetail(row.dataset.eventId));
    });
  }

  async function loadDetail(eventId) {
    state.selectedEventId = eventId;
    openDetailModal();
    document.getElementById("detailStatus").textContent = "加载中";
    document.getElementById("detailPanel").className = "internal-events-detail-empty";
    document.getElementById("detailPanel").textContent = "加载中...";
    const response = await fetch(`/api/admin/internal-events/${encodeURIComponent(eventId)}`);
    const data = await readJson(response);
    if (!response.ok || !data.ok) {
      document.getElementById("detailStatus").textContent = "加载失败";
      document.getElementById("detailPanel").className = "internal-events-detail-empty";
      document.getElementById("detailPanel").textContent = data.error || "事件不存在";
      return;
    }
    const event = data.event || {};
    const runs = data.consumer_runs || [];
    const attempts = data.attempts || [];
    const reconciliation = data.reconciliation || {};
    const reconciliationStates = reconciliationStateMap(reconciliation);
    document.getElementById("detailStatus").textContent = eventLabel(event);
    const panel = document.getElementById("detailPanel");
    panel.className = "internal-events-detail-body";
    panel.innerHTML = `
      <div class="internal-events-section">
        <h3>基础信息</h3>
        <div class="internal-events-kv">
          <div class="internal-events-kv-key">事件</div><div>${escapeHtml(eventLabel(event))}</div>
          <div class="internal-events-kv-key">类型</div><div>${escapeHtml(eventSectionLabel(event))}</div>
          <div class="internal-events-kv-key">业务对象</div><div class="internal-events-mono">${escapeHtml(businessObjectLabel(event))}</div>
          <div class="internal-events-kv-key">主体</div><div class="internal-events-mono">${escapeHtml(subjectLabel(event))}</div>
          <div class="internal-events-kv-key">来源</div><div>${escapeHtml(sourceLabel(event))}</div>
          <div class="internal-events-kv-key">发生时间</div><div>${beijingTimeCell(event.occurred_at || event.created_at)}</div>
          <div class="internal-events-kv-key">事件 ID</div><div class="internal-events-mono">${escapeHtml(event.event_id)}</div>
          <div class="internal-events-kv-key">追踪 ID</div><div class="internal-events-mono">${escapeHtml(event.trace_id || "-")}</div>
        </div>
      </div>
      <div class="internal-events-section">
        <h3>Payload 摘要</h3>
        <pre class="internal-events-json">${escapeHtml(JSON.stringify(data.payload_summary_json || {}, null, 2))}</pre>
      </div>
      <div class="internal-events-section">
        ${renderReconciliationPanel(reconciliation)}
      </div>
      <div class="internal-events-section">
        <h3>消费者状态</h3>
        <div class="internal-events-detail-table-wrap">
          <table class="admin-table internal-events-consumer-table">
            <thead>
              <tr>
                <th>消费者</th>
                <th>状态 / 原因</th>
                <th>尝试</th>
                <th>错误</th>
                <th>下次重试</th>
                <th>结果摘要</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${runs.map(run => {
                const why = whyPendingForRun(run, reconciliationStates);
                return `
                  <tr title="${escapeHtml(why.message || "")}">
                    <td>
                      ${ellipsis(consumerLabel(run.consumer_name), "internal-events-strong")}
                    </td>
                    <td>
                      ${badge(run.status)}
                      ${categoryTag(why.category || "")}
                      <div class="internal-events-consumer-hint">${escapeHtml(why.message || "-")}</div>
                    </td>
                    <td>${Number(run.attempt_count || 0)} / ${Number(run.max_attempts || 0)}</td>
                    <td>
                      ${ellipsis(run.last_error_code || "", "internal-events-mono")}
                      ${ellipsis(run.last_error_message || "", "internal-events-muted")}
                    </td>
                    <td>${run.next_retry_at ? beijingTimeCell(run.next_retry_at) : "-"}</td>
                    <td><pre class="internal-events-json">${escapeHtml(JSON.stringify(run.result_summary_json || {}, null, 2))}</pre></td>
                    <td>
                      <div class="internal-events-action-row">
                        <button class="admin-button admin-button--secondary" type="button" data-action="retry" data-event-id="${escapeHtml(event.event_id)}" data-consumer-name="${escapeHtml(run.consumer_name)}">重试</button>
                        <button class="admin-button admin-button--danger" type="button" data-action="skip" data-event-id="${escapeHtml(event.event_id)}" data-consumer-name="${escapeHtml(run.consumer_name)}">跳过</button>
                      </div>
                    </td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>
      <div class="internal-events-section">
        <h3>执行明细</h3>
        ${attempts.length ? attempts.map(attempt => `
          <div class="internal-events-attempt">
            <div class="internal-events-attempt-head">
              <span>
                <span class="internal-events-mono">${escapeHtml(attempt.attempt_id)}</span>
                <span class="internal-events-muted">${escapeHtml(consumerLabel(attempt.consumer_name))}</span>
              </span>
              ${badge(attempt.status)}
            </div>
            <div class="internal-events-kv">
              <div class="internal-events-kv-key">错误</div><div>${escapeHtml(attempt.error || "-")}</div>
              <div class="internal-events-kv-key">开始时间</div><div>${attempt.started_at ? beijingTimeCell(attempt.started_at) : "-"}</div>
              <div class="internal-events-kv-key">完成时间</div><div>${attempt.completed_at ? beijingTimeCell(attempt.completed_at) : "-"}</div>
            </div>
            <pre class="internal-events-json">${escapeHtml(JSON.stringify({
              request_summary: attempt.request_summary_json || {},
              response_summary: attempt.response_summary_json || {}
            }, null, 2))}</pre>
          </div>
        `).join("") : `<div class="internal-events-muted">暂无 attempt</div>`}
      </div>
    `;
  }

  async function mutateConsumer(eventId, consumerName, action) {
    const credential = window.prompt("请输入管理员操作口令");
    if (!credential) return;
    const reason = window.prompt(action === "skip" ? "跳过原因（必填）" : "重试原因（必填）", action === "skip" ? "operator_skip" : "operator_retry") || "";
    if (!reason.trim()) return;
    const actionHeader = "X-Admin-Action-" + "To" + "ken";
    const response = await fetch(`/api/admin/internal-events/${encodeURIComponent(eventId)}/consumers/${encodeURIComponent(consumerName)}/${action}`, {
      method: "POST",
      headers: { "Content-Type": "application/json", [actionHeader]: credential },
      body: JSON.stringify({ reason })
    });
    const data = await readJson(response);
    if (!response.ok || !data.ok) {
      window.alert(data.error || `${action} failed`);
      return;
    }
    await loadEvents();
    await loadDetail(eventId);
  }

  function refreshCurrentView() {
    loadEvents();
    if (state.selectedEventId && document.getElementById("detailModal").classList.contains("is-open")) loadDetail(state.selectedEventId);
  }

  function exportCurrentFilter() {
    window.open(`/api/admin/internal-events?${qs({ event_section: state.section, limit: 200, ...state.filters })}`, "_blank", "noopener");
  }

  function bindEvents() {
    document.getElementById("sectionTabs").addEventListener("click", event => {
      const btn = event.target.closest(".internal-events-tab");
      if (!btn) return;
      document.querySelectorAll(".internal-events-tab").forEach(item => item.classList.remove("active"));
      btn.classList.add("active");
      state.section = btn.dataset.section || "";
      loadEvents();
    });

    document.getElementById("filterForm").addEventListener("input", event => {
      const form = new FormData(event.currentTarget);
      state.filters = Object.fromEntries(form.entries());
      loadEvents();
    });
    document.querySelectorAll('a[href="#refresh"]').forEach(anchor => {
      anchor.addEventListener("click", event => {
        event.preventDefault();
        refreshCurrentView();
      });
    });
    document.querySelectorAll('a[href="#export"]').forEach(anchor => {
      anchor.addEventListener("click", event => {
        event.preventDefault();
        exportCurrentFilter();
      });
    });
    document.getElementById("detailPanel").addEventListener("click", event => {
      const btn = event.target.closest("button[data-action][data-event-id][data-consumer-name]");
      if (!btn) return;
      mutateConsumer(btn.dataset.eventId, btn.dataset.consumerName, btn.dataset.action);
    });
    document.getElementById("detailModal").addEventListener("click", event => {
      if (event.target.closest("[data-close-detail]")) {
        closeDetailModal();
      }
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeDetailModal();
    });
  }

  bindEvents();
  loadEvents();
})();
</script>
{% endblock %}
