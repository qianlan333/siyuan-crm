{% extends "admin_console/base.html" %}

{% block content %}
<section class="webhook-inbox-page" data-route-owner="ai_crm_next" data-admin-action-token="{{ admin_action_token }}">
  <section class="webhook-inbox-stats" aria-label="Webhook Inbox 队列统计">
    <article class="admin-card webhook-inbox-stat"><div class="webhook-inbox-stat-label">待处理</div><div class="webhook-inbox-stat-value" data-stat="due_count">-</div></article>
    <article class="admin-card webhook-inbox-stat"><div class="webhook-inbox-stat-label">处理中</div><div class="webhook-inbox-stat-value" data-stat="processing_count">-</div></article>
    <article class="admin-card webhook-inbox-stat"><div class="webhook-inbox-stat-label">失败可重试</div><div class="webhook-inbox-stat-value" data-stat="failed_retryable_count">-</div></article>
    <article class="admin-card webhook-inbox-stat"><div class="webhook-inbox-stat-label">死信</div><div class="webhook-inbox-stat-value" data-stat="dead_letter_count">-</div></article>
    <article class="admin-card webhook-inbox-stat"><div class="webhook-inbox-stat-label">最老积压秒数</div><div class="webhook-inbox-stat-value" data-stat="oldest_received_age_seconds">-</div></article>
  </section>

  <section class="webhook-inbox-insights" aria-label="Webhook Inbox 分布与错误">
    <article class="admin-card webhook-inbox-insight">
      <div class="webhook-inbox-card-title">Provider 分布</div>
      <div class="webhook-inbox-insight-list" id="providerDistribution">加载中...</div>
    </article>
    <article class="admin-card webhook-inbox-insight">
      <div class="webhook-inbox-card-title">Route 分布</div>
      <div class="webhook-inbox-insight-list" id="routeDistribution">加载中...</div>
    </article>
    <article class="admin-card webhook-inbox-insight">
      <div class="webhook-inbox-card-title">最近错误</div>
      <div class="webhook-inbox-insight-list" id="recentErrors">加载中...</div>
    </article>
  </section>

  <section class="webhook-inbox-layout">
    <div class="admin-card webhook-inbox-main">
      <div class="webhook-inbox-card-head">
        <div class="webhook-inbox-card-title">入站回调</div>
        <div class="webhook-inbox-muted" id="totalText">共 - 条</div>
      </div>

      <form class="webhook-inbox-filters" id="filterForm">
        <label class="webhook-inbox-field">Provider
          <select name="provider">
            <option value="wecom">wecom</option>
            <option value="">全部</option>
          </select>
        </label>
        <label class="webhook-inbox-field">事件族
          <select name="event_family">
            <option value="external_contact">external_contact</option>
            <option value="">全部</option>
          </select>
        </label>
        <label class="webhook-inbox-field">状态
          <select name="status">
            <option value="">全部</option>
            <option value="pending_failed">待处理/失败</option>
            <option value="received">received</option>
            <option value="processing">processing</option>
            <option value="succeeded">succeeded</option>
            <option value="failed_retryable">failed_retryable</option>
            <option value="failed_terminal">failed_terminal</option>
            <option value="dead_letter">dead_letter</option>
            <option value="ignored">ignored</option>
          </select>
        </label>
        <label class="webhook-inbox-field">Event
          <input name="event_type" placeholder="change_external_contact">
        </label>
        <label class="webhook-inbox-field">ChangeType
          <input name="change_type" placeholder="add_external_contact">
        </label>
        <label class="webhook-inbox-field">接收开始
          <input name="received_from" type="datetime-local">
        </label>
        <label class="webhook-inbox-field">接收结束
          <input name="received_to" type="datetime-local">
        </label>
      </form>

      <div class="webhook-inbox-actions">
        <button class="admin-button admin-button--secondary" type="button" id="refreshButton">刷新</button>
        <button class="admin-button admin-button--secondary" type="button" id="dryRunButton">Dry-run 消费</button>
        <button class="admin-button admin-button--secondary" type="button" id="reconciliationButton">企微核对</button>
        <span class="webhook-inbox-muted" id="actionStatus">-</span>
      </div>

      <div class="webhook-inbox-table-wrap">
        <table class="admin-table webhook-inbox-table" id="webhookInboxTable">
          <colgroup>
            <col class="webhook-inbox-col-id">
            <col class="webhook-inbox-col-source">
            <col class="webhook-inbox-col-status">
            <col class="webhook-inbox-col-event">
            <col class="webhook-inbox-col-key">
            <col class="webhook-inbox-col-error">
            <col class="webhook-inbox-col-time">
          </colgroup>
          <thead>
            <tr>
              <th>ID</th>
              <th>来源</th>
              <th>状态</th>
              <th>事件</th>
              <th>幂等键</th>
              <th>错误</th>
              <th>时间</th>
            </tr>
          </thead>
          <tbody id="itemsTbody">
            <tr><td colspan="7" class="admin-empty-cell">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <div class="webhook-inbox-modal" id="detailModal" aria-hidden="true">
    <div class="webhook-inbox-modal-backdrop" data-close-detail></div>
    <section class="admin-card webhook-inbox-modal-card" role="dialog" aria-modal="true" aria-labelledby="detailModalTitle">
      <div class="webhook-inbox-card-head">
        <div>
          <div class="webhook-inbox-card-title" id="detailModalTitle">回调详情</div>
          <span class="webhook-inbox-muted" id="detailStatus">加载中</span>
        </div>
        <button class="webhook-inbox-close" type="button" aria-label="关闭回调详情" data-close-detail>×</button>
      </div>
      <div id="detailPanel" class="webhook-inbox-detail-empty">加载中...</div>
    </section>
  </div>
</section>

<style>
.webhook-inbox-page { --wi-line: #e5e7eb; --wi-muted: #6b7280; --wi-primary: #2563eb; --wi-success: #059669; --wi-warning: #d97706; --wi-danger: #dc2626; --wi-blocked: #7c3aed; }
.webhook-inbox-stats { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
.webhook-inbox-stat { padding: 14px; }
.webhook-inbox-stat-label { font-size: 12px; color: var(--wi-muted); margin-bottom: 8px; }
.webhook-inbox-stat-value { font-size: 22px; font-weight: 700; }
.webhook-inbox-insights { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
.webhook-inbox-insight { padding: 14px; min-width: 0; }
.webhook-inbox-insight-list { display: grid; gap: 8px; margin-top: 10px; min-height: 52px; }
.webhook-inbox-insight-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: center; font-size: 12px; }
.webhook-inbox-insight-key { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #111827; }
.webhook-inbox-insight-count { font-weight: 700; color: #111827; }
.webhook-inbox-insight-empty { color: var(--wi-muted); font-size: 12px; }
.webhook-inbox-error-row { display: grid; gap: 3px; font-size: 12px; min-width: 0; }
.webhook-inbox-layout { display: block; }
.webhook-inbox-main { overflow: hidden; }
.webhook-inbox-card-head { padding: 14px 16px; border-bottom: 1px solid var(--wi-line); display: flex; justify-content: space-between; gap: 12px; align-items: center; }
.webhook-inbox-card-title { font-weight: 700; font-size: 15px; }
.webhook-inbox-muted { color: var(--wi-muted); }
.webhook-inbox-filters { display: grid; grid-template-columns: repeat(7, minmax(118px, 1fr)); gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--wi-line); }
.webhook-inbox-field { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--wi-muted); }
.webhook-inbox-field input, .webhook-inbox-field select { height: 36px; border: 1px solid var(--wi-line); border-radius: 8px; padding: 0 10px; background: #fff; font-size: 13px; color: #1f2937; min-width: 0; }
.webhook-inbox-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 12px 16px; border-bottom: 1px solid var(--wi-line); background: #fafafa; }
.webhook-inbox-table-wrap { overflow-x: auto; }
.webhook-inbox-table { table-layout: fixed; min-width: 1120px; }
.webhook-inbox-col-id { width: 78px; }
.webhook-inbox-col-source { width: 170px; }
.webhook-inbox-col-status { width: 130px; }
.webhook-inbox-col-event { width: 210px; }
.webhook-inbox-col-key { width: 260px; }
.webhook-inbox-col-error { width: 170px; }
.webhook-inbox-col-time { width: 150px; }
.webhook-inbox-table th, .webhook-inbox-table td { vertical-align: top; }
.webhook-inbox-table tbody tr[data-inbox-id] { cursor: pointer; }
.webhook-inbox-table tbody tr[data-inbox-id]:hover td { background: #f9fafb; }
.webhook-inbox-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; }
.webhook-inbox-strong { font-weight: 600; color: #111827; }
.webhook-inbox-ellipsis { display: block; max-width: 100%; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.webhook-inbox-time { min-width: 126px; white-space: nowrap; }
.webhook-inbox-time-date { color: #111827; font-weight: 600; }
.webhook-inbox-time-clock { color: var(--wi-muted); font-size: 12px; margin-top: 3px; }
.webhook-inbox-badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 8px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.webhook-inbox-badge.received, .webhook-inbox-badge.processing { color: var(--wi-primary); background: #eff6ff; }
.webhook-inbox-badge.succeeded { color: var(--wi-success); background: #ecfdf5; }
.webhook-inbox-badge.failed_retryable { color: var(--wi-warning); background: #fffbeb; }
.webhook-inbox-badge.failed_terminal, .webhook-inbox-badge.dead_letter { color: var(--wi-danger); background: #fef2f2; }
.webhook-inbox-badge.ignored { color: var(--wi-muted); background: #f3f4f6; }
.webhook-inbox-modal { position: fixed; inset: 0; display: none; z-index: 1000; }
.webhook-inbox-modal.is-open { display: block; }
.webhook-inbox-modal-backdrop { position: absolute; inset: 0; background: rgba(15, 23, 42, .42); }
.webhook-inbox-modal-card { position: relative; width: min(980px, calc(100vw - 32px)); max-height: calc(100vh - 56px); margin: 28px auto; overflow: hidden; display: flex; flex-direction: column; }
.webhook-inbox-close { border: 1px solid var(--wi-line); background: #fff; color: #374151; border-radius: 8px; width: 34px; height: 34px; font-size: 22px; line-height: 1; cursor: pointer; }
.webhook-inbox-detail-empty { padding: 32px 20px; color: var(--wi-muted); text-align: center; }
.webhook-inbox-detail-body { padding: 16px; overflow: auto; }
.webhook-inbox-section { margin-bottom: 18px; }
.webhook-inbox-section h3 { font-size: 14px; margin: 0 0 10px; }
.webhook-inbox-kv { display: grid; grid-template-columns: 142px minmax(0, 1fr); gap: 8px 10px; font-size: 13px; margin-bottom: 10px; }
.webhook-inbox-kv-key { color: var(--wi-muted); }
.webhook-inbox-json { background: #111827; color: #e5e7eb; border-radius: 8px; padding: 10px; overflow: auto; max-height: 260px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
.webhook-inbox-detail-actions { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 8px; }
.webhook-inbox-alert { border: 1px solid #bfdbfe; color: #1d4ed8; background: #eff6ff; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; font-size: 13px; }
.webhook-inbox-chain { display: grid; gap: 10px; }
.webhook-inbox-chain-node { border: 1px solid var(--wi-line); border-radius: 8px; padding: 10px; background: #fff; }
.webhook-inbox-chain-title { display: flex; justify-content: space-between; gap: 10px; align-items: center; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.webhook-inbox-chain-count { color: var(--wi-muted); font-size: 12px; font-weight: 500; }
.webhook-inbox-chain-items { display: grid; gap: 6px; }
.webhook-inbox-chain-item { background: #f9fafb; border-radius: 8px; padding: 8px; font-size: 12px; min-width: 0; }
.webhook-inbox-chain-line { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
@media (max-width: 1200px) {
  .webhook-inbox-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .webhook-inbox-insights { grid-template-columns: 1fr; }
  .webhook-inbox-filters { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}
@media (max-width: 680px) {
  .webhook-inbox-stats, .webhook-inbox-insights, .webhook-inbox-filters { grid-template-columns: 1fr; }
  .webhook-inbox-modal-card { width: calc(100vw - 16px); max-height: calc(100vh - 24px); margin: 12px auto; }
  .webhook-inbox-kv { grid-template-columns: 1fr; }
}
</style>

<script>
(() => {
  const state = { filters: {}, itemsById: new Map(), selectedId: null };
  const STATUS_LABELS = {
    received: "待处理",
    processing: "处理中",
    succeeded: "成功",
    failed_retryable: "失败可重试",
    failed_terminal: "失败不可重试",
    dead_letter: "死信",
    ignored: "已忽略"
  };

  function adminToken() {
    return document.querySelector(".webhook-inbox-page")?.dataset.adminActionToken || "";
  }

  function qs(params) {
    const p = new URLSearchParams();
    Object.entries(params).forEach(([k, v]) => {
      if (v !== undefined && v !== null && String(v).trim() !== "") p.set(k, v);
    });
    return p.toString();
  }

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  async function readJson(response) {
    try { return await response.json(); } catch (_) { return {}; }
  }

  function labelFor(map, value) {
    return map[value] || value || "-";
  }

  function ellipsis(value, className = "") {
    return `<span class="webhook-inbox-ellipsis ${className}" title="${escapeHtml(value || "-")}">${escapeHtml(value || "-")}</span>`;
  }

  function badge(status) {
    const safeClass = String(status || "").replace(/[^a-zA-Z0-9_-]/g, "");
    return `<span class="webhook-inbox-badge ${safeClass}">${escapeHtml(labelFor(STATUS_LABELS, status))}</span>`;
  }

  function formatBeijingTime(value) {
    if (!value) return { date: "-", time: "北京时间" };
    const parsed = new Date(value);
    if (Number.isNaN(parsed.getTime())) return { date: String(value), time: "北京时间" };
    const parts = new Intl.DateTimeFormat("zh-CN", {
      timeZone: "Asia/Shanghai",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    }).formatToParts(parsed).reduce((acc, part) => {
      if (part.type !== "literal") acc[part.type] = part.value;
      return acc;
    }, {});
    return { date: `${parts.year}-${parts.month}-${parts.day}`, time: `${parts.hour}:${parts.minute}:${parts.second}` };
  }

  function timeCell(value) {
    const formatted = formatBeijingTime(value);
    return `
      <div class="webhook-inbox-time" title="${escapeHtml(`${formatted.date} ${formatted.time} 北京时间`)}">
        <div class="webhook-inbox-time-date">${escapeHtml(formatted.date)}</div>
        <div class="webhook-inbox-time-clock">${escapeHtml(formatted.time)}</div>
      </div>
    `;
  }

  function renderMetricList(elementId, items, keyField, emptyText) {
    const element = document.getElementById(elementId);
    const list = Array.isArray(items) ? items : [];
    if (!list.length) {
      element.innerHTML = `<div class="webhook-inbox-insight-empty">${escapeHtml(emptyText)}</div>`;
      return;
    }
    element.innerHTML = list.map(item => `
      <div class="webhook-inbox-insight-row">
        <span class="webhook-inbox-insight-key webhook-inbox-mono" title="${escapeHtml(item[keyField] || "-")}">${escapeHtml(item[keyField] || "-")}</span>
        <span class="webhook-inbox-insight-count">${Number(item.count || 0)}</span>
      </div>
    `).join("");
  }

  function renderRecentErrors(items) {
    const element = document.getElementById("recentErrors");
    const list = Array.isArray(items) ? items : [];
    if (!list.length) {
      element.innerHTML = `<div class="webhook-inbox-insight-empty">暂无错误</div>`;
      return;
    }
    element.innerHTML = list.map(item => {
      const formatted = formatBeijingTime(item.last_seen_at);
      return `
        <div class="webhook-inbox-error-row">
          <div class="webhook-inbox-insight-row">
            <span class="webhook-inbox-insight-key" title="${escapeHtml(item.error_message || "-")}">${escapeHtml(item.error_code || "-")} · ${escapeHtml(item.status || "-")}</span>
            <span class="webhook-inbox-insight-count">${Number(item.count || 0)}</span>
          </div>
          <div class="webhook-inbox-muted webhook-inbox-ellipsis" title="${escapeHtml(item.error_message || "-")}">${escapeHtml(item.error_message || "-")}</div>
          <div class="webhook-inbox-muted">${escapeHtml(formatted.date)} ${escapeHtml(formatted.time)}</div>
        </div>
      `;
    }).join("");
  }

  function currentFilters() {
    const form = document.getElementById("filterForm");
    const values = Object.fromEntries(new FormData(form).entries());
    return Object.fromEntries(Object.entries(values).filter(([, value]) => String(value || "").trim() !== ""));
  }

  function setActionStatus(message) {
    document.getElementById("actionStatus").textContent = message || "-";
  }

  async function loadMetrics() {
    const response = await fetch(`/api/admin/webhook-inbox/metrics?${qs(state.filters)}`);
    const data = await readJson(response);
    const metrics = data.queue_metrics || {};
    ["due_count", "processing_count", "failed_retryable_count", "dead_letter_count", "oldest_received_age_seconds"].forEach(key => {
      document.querySelector(`[data-stat="${key}"]`).textContent = metrics[key] ?? 0;
    });
    renderMetricList("providerDistribution", metrics.provider_distribution, "provider", "暂无 provider");
    renderMetricList("routeDistribution", metrics.route_distribution, "route", "暂无 route");
    renderRecentErrors(metrics.recent_errors);
  }

  async function loadItems() {
    const response = await fetch(`/api/admin/webhook-inbox/items?${qs({ limit: 50, ...state.filters })}`);
    const data = await readJson(response);
    const items = data.items || [];
    state.itemsById = new Map(items.map(item => [String(item.id), item]));
    document.getElementById("totalText").textContent = `共 ${items.length} 条`;
    const tbody = document.getElementById("itemsTbody");
    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="admin-empty-cell">暂无回调</td></tr>`;
      return;
    }
    tbody.innerHTML = items.map(item => {
      const source = `${item.provider || "-"} / ${item.event_family || "-"}`;
      const eventName = `${item.event_type || "-"} / ${item.change_type || "-"}`;
      return `
        <tr data-inbox-id="${escapeHtml(item.id)}">
          <td><span class="webhook-inbox-mono">${escapeHtml(item.id)}</span></td>
          <td>${ellipsis(source, "webhook-inbox-strong")}${ellipsis(item.route, "webhook-inbox-mono webhook-inbox-muted")}</td>
          <td>${badge(item.status)}<div class="webhook-inbox-muted">attempt ${Number(item.attempt_count || 0)} / ${Number(item.max_attempts || 0)}</div></td>
          <td>${ellipsis(eventName, "webhook-inbox-strong")}${ellipsis(item.external_event_id, "webhook-inbox-mono webhook-inbox-muted")}</td>
          <td>${ellipsis(item.idempotency_key, "webhook-inbox-mono")}</td>
          <td>${ellipsis(item.last_error_code || "-")}${ellipsis(item.last_error_message || "", "webhook-inbox-muted")}</td>
          <td>${timeCell(item.received_at || item.last_seen_at)}</td>
        </tr>
      `;
    }).join("");
    tbody.querySelectorAll("tr[data-inbox-id]").forEach(row => {
      row.addEventListener("click", () => openDetail(row.dataset.inboxId));
    });
  }

  async function refreshAll() {
    state.filters = currentFilters();
    setActionStatus("加载中...");
    await Promise.all([loadMetrics(), loadItems()]);
    setActionStatus("已刷新");
  }

  function openDetailModal() {
    const modal = document.getElementById("detailModal");
    modal.classList.add("is-open");
    modal.setAttribute("aria-hidden", "false");
  }

  function closeDetailModal() {
    const modal = document.getElementById("detailModal");
    modal.classList.remove("is-open");
    modal.setAttribute("aria-hidden", "true");
  }

  function chainNode(title, items, renderItem) {
    const list = Array.isArray(items) ? items : [];
    return `
      <div class="webhook-inbox-chain-node">
        <div class="webhook-inbox-chain-title">
          <span>${escapeHtml(title)}</span>
          <span class="webhook-inbox-chain-count">${list.length} 条</span>
        </div>
        <div class="webhook-inbox-chain-items">
          ${list.length ? list.map(renderItem).join("") : `<div class="webhook-inbox-muted">暂无记录</div>`}
        </div>
      </div>
    `;
  }

  function renderChain(chain) {
    const safe = chain || {};
    const webhookItem = state.itemsById.get(String(safe.webhook_inbox_id)) || {};
    const webhookRows = [{
      id: safe.webhook_inbox_id,
      status: webhookItem.status,
      idempotency_key: webhookItem.idempotency_key,
      event_log_id: safe.event_log_id
    }];
    return `
      <div class="webhook-inbox-chain">
        ${chainNode("webhook_inbox", webhookRows, item => `
          <div class="webhook-inbox-chain-item">
            <div class="webhook-inbox-chain-line">
              <span class="webhook-inbox-mono">#${escapeHtml(item.id || "-")}</span>
              ${badge(item.status)}
              <span class="webhook-inbox-mono">event_log_id=${escapeHtml(item.event_log_id || "-")}</span>
            </div>
            <div class="webhook-inbox-mono webhook-inbox-ellipsis" title="${escapeHtml(item.idempotency_key || "-")}">${escapeHtml(item.idempotency_key || "-")}</div>
          </div>
        `)}
        ${chainNode("internal_event", safe.internal_events, item => `
          <div class="webhook-inbox-chain-item">
            <div class="webhook-inbox-chain-line">
              <span class="webhook-inbox-mono">${escapeHtml(item.event_id || "-")}</span>
              <span>${escapeHtml(item.event_type || "-")}</span>
            </div>
            <div class="webhook-inbox-muted">source_command_id=${escapeHtml(item.source_command_id || "-")}</div>
          </div>
        `)}
        ${chainNode("internal_event_consumer_run", safe.internal_event_consumer_runs, item => `
          <div class="webhook-inbox-chain-item">
            <div class="webhook-inbox-chain-line">
              <span class="webhook-inbox-mono">#${escapeHtml(item.id || "-")}</span>
              ${badge(item.status)}
              <span>${escapeHtml(item.consumer_name || "-")}</span>
            </div>
            <div class="webhook-inbox-muted">attempt ${Number(item.attempt_count || 0)} / ${Number(item.max_attempts || 0)}</div>
          </div>
        `)}
        ${chainNode("external_effect_job", safe.external_effect_jobs, item => `
          <div class="webhook-inbox-chain-item">
            <div class="webhook-inbox-chain-line">
              <span class="webhook-inbox-mono">#${escapeHtml(item.id || "-")}</span>
              ${badge(item.status)}
              <span>${escapeHtml(item.effect_type || "-")}</span>
            </div>
            <div class="webhook-inbox-muted">source_event_id=${escapeHtml(item.source_event_id || "-")} mode=${escapeHtml(item.execution_mode || "-")}</div>
          </div>
        `)}
        ${chainNode("external_effect_attempt", safe.external_effect_attempts, item => `
          <div class="webhook-inbox-chain-item">
            <div class="webhook-inbox-strong">job #${escapeHtml(item.job_id || "-")}</div>
            ${(item.attempts || []).length ? (item.attempts || []).map(attempt => `
              <div class="webhook-inbox-chain-line">
                <span class="webhook-inbox-mono">${escapeHtml(attempt.attempt_id || "-")}</span>
                ${badge(attempt.status)}
                <span>${escapeHtml(attempt.adapter_name || "-")}</span>
              </div>
            `).join("") : `<div class="webhook-inbox-muted">暂无尝试记录</div>`}
          </div>
        `)}
      </div>
    `;
  }

  function renderDetail(item, chain) {
    const summary = JSON.stringify(item.payload_summary_json || {}, null, 2);
    const processingSummary = JSON.stringify(item.processing_summary_json || {}, null, 2);
    const itemJson = JSON.stringify(item, null, 2);
    return `
      <div class="webhook-inbox-detail-body">
        <div class="webhook-inbox-alert">处理链路入口：webhook_inbox #${escapeHtml(item.id)}。下方按实际已落库节点展示；空记录表示该阶段未产生或尚未处理。</div>
        <section class="webhook-inbox-section">
          <h3>基础信息</h3>
          <div class="webhook-inbox-kv">
            <div class="webhook-inbox-kv-key">状态</div><div>${badge(item.status)}</div>
            <div class="webhook-inbox-kv-key">来源</div><div>${escapeHtml(item.provider)} / ${escapeHtml(item.event_family)}</div>
            <div class="webhook-inbox-kv-key">路由</div><div class="webhook-inbox-mono">${escapeHtml(item.route)}</div>
            <div class="webhook-inbox-kv-key">事件</div><div>${escapeHtml(item.event_type || "-")} / ${escapeHtml(item.change_type || "-")}</div>
            <div class="webhook-inbox-kv-key">幂等键</div><div class="webhook-inbox-mono">${escapeHtml(item.idempotency_key)}</div>
            <div class="webhook-inbox-kv-key">重复次数</div><div>${Number(item.duplicate_count || 0)}</div>
            <div class="webhook-inbox-kv-key">错误</div><div>${escapeHtml(item.last_error_code || "-")} ${escapeHtml(item.last_error_message || "")}</div>
          </div>
        </section>
        <section class="webhook-inbox-section">
          <h3>处理链路</h3>
          ${renderChain(chain)}
        </section>
        <section class="webhook-inbox-section">
          <h3>处理摘要</h3>
          <pre class="webhook-inbox-json">${escapeHtml(processingSummary)}</pre>
        </section>
        <section class="webhook-inbox-section">
          <h3>Payload 摘要</h3>
          <pre class="webhook-inbox-json">${escapeHtml(summary)}</pre>
        </section>
        <section class="webhook-inbox-section">
          <h3>脱敏详情</h3>
          <pre class="webhook-inbox-json">${escapeHtml(itemJson)}</pre>
        </section>
        <div class="webhook-inbox-detail-actions">
          <button class="admin-button admin-button--secondary" type="button" data-detail-action="dispatch-preview">预演单条</button>
          <button class="admin-button" type="button" data-detail-action="dispatch">执行单条</button>
          <button class="admin-button admin-button--secondary" type="button" data-detail-action="retry">重试</button>
          <button class="admin-button admin-button--danger" type="button" data-detail-action="skip">忽略</button>
        </div>
      </div>
    `;
  }

  async function openDetail(id) {
    const item = state.itemsById.get(String(id));
    if (!item) return;
    state.selectedId = String(id);
    openDetailModal();
    document.getElementById("detailStatus").textContent = `#${id}`;
    document.getElementById("detailPanel").className = "";
    document.getElementById("detailPanel").innerHTML = `<div class="webhook-inbox-detail-empty">加载中...</div>`;
    const response = await fetch(`/api/admin/webhook-inbox/${encodeURIComponent(id)}`);
    const data = await readJson(response);
    if (!data.ok) {
      document.getElementById("detailPanel").innerHTML = `<div class="webhook-inbox-detail-empty">${escapeHtml(data.error || "加载失败")}</div>`;
      return;
    }
    state.itemsById.set(String(id), data.item || item);
    document.getElementById("detailPanel").innerHTML = renderDetail(data.item || item, data.processing_chain || {});
    document.querySelectorAll("[data-detail-action]").forEach(button => {
      button.addEventListener("click", () => performItemAction(button.dataset.detailAction));
    });
  }

  async function performItemAction(action) {
    if (!state.selectedId) return;
    const endpointAction = action === "dispatch-preview" ? "dispatch" : action;
    const payload = {
      admin_action_token: adminToken(),
      reason: `admin_ui_${action}`
    };
    if (action === "dispatch-preview") payload.dry_run = true;
    if (action === "dispatch") payload.dry_run = false;
    const response = await fetch(`/api/admin/webhook-inbox/${encodeURIComponent(state.selectedId)}/${endpointAction}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });
    const data = await readJson(response);
    setActionStatus(data.ok ? `${action} 已提交` : (data.error || `${action} 失败`));
    if (data.ok) {
      closeDetailModal();
      await refreshAll();
    }
  }

  async function runDuePreview() {
    setActionStatus("Dry-run 中...");
    const response = await fetch("/api/admin/webhook-inbox/run-due", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ admin_action_token: adminToken(), provider: "wecom", limit: 20, dry_run: true })
    });
    const data = await readJson(response);
    setActionStatus(data.ok ? `Dry-run: ${Number(data.due_count || data.claimed_count || 0)} 条` : (data.error || "Dry-run 失败"));
  }

  async function loadReconciliation() {
    setActionStatus("核对中...");
    const response = await fetch(`/api/admin/wecom/callback/reconciliation?${qs({ limit: 20, ...state.filters })}`);
    const data = await readJson(response);
    const metrics = data.queue_metrics || {};
    setActionStatus(data.ok ? `企微核对: due ${Number(metrics.due_count || 0)} / dead ${Number(metrics.dead_letter_count || 0)}` : (data.error || "核对失败"));
  }

  document.getElementById("filterForm").addEventListener("change", refreshAll);
  document.getElementById("filterForm").addEventListener("submit", event => { event.preventDefault(); refreshAll(); });
  document.getElementById("refreshButton").addEventListener("click", refreshAll);
  document.getElementById("dryRunButton").addEventListener("click", runDuePreview);
  document.getElementById("reconciliationButton").addEventListener("click", loadReconciliation);
  document.querySelectorAll("[data-close-detail]").forEach(node => node.addEventListener("click", closeDetailModal));
  document.addEventListener("keydown", event => { if (event.key === "Escape") closeDetailModal(); });
  document.querySelectorAll('a[href="#refresh"]').forEach(node => node.addEventListener("click", event => { event.preventDefault(); refreshAll(); }));
  document.querySelectorAll('a[href="#run-due-preview"]').forEach(node => node.addEventListener("click", event => { event.preventDefault(); runDuePreview(); }));
  refreshAll();
})();
</script>
{% endblock %}
