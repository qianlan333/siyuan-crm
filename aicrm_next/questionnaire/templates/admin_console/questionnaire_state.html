{% extends "admin_shell/base.html" %}

{% block content %}
<section class="admin-card">
  <div class="admin-card-head">
    <div>
      <h2>{{ state_title }}</h2>
      <p>{{ state_body }}</p>
    </div>
    <div class="admin-toolbar">
      {% for action in actions %}
      <a class="admin-button admin-button--{{ action.variant or 'secondary' }}" href="{{ action.href }}">{{ action.label }}</a>
      {% endfor %}
    </div>
  </div>
  {% if state_items %}
  <ul class="admin-bullet-list">
    {% for item in state_items %}
    <li>{{ item }}</li>
    {% endfor %}
  </ul>
  {% endif %}
</section>
{% endblock %}
