<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} · 周期商品数据</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_console/admin_console.css') }}?v=operation-member-picker-fix-20260527">
  {% block head_extra %}{% endblock %}
  <script defer src="{{ url_for('static', filename='admin_console/admin_api_client.js') }}?v=admin-request-security-v2-20260713"></script>
</head>
<body class="sp-compact-admin-shell">
  <header class="sp-compact-header">
    <div>
      <span class="sp-compact-kicker">周期商品数据工作区</span>
      <h1>{{ page_title }}</h1>
    </div>
    <div class="sp-compact-header__actions">
      <span class="sp-readonly-badge">受限协作</span>
      <a href="{{ url_for('api.admin_logout') }}">退出登录</a>
    </div>
  </header>
  <main class="sp-compact-main">
    {% if page_error %}<section class="admin-alert admin-alert--error">{{ page_error }}</section>{% endif %}
    {% block content %}{% endblock %}
  </main>
  <script id="aicrmAdminActionGrants" type="application/json">{{ (admin_action_tokens or {}) | tojson }}</script>
  {% block scripts_extra %}{% endblock %}
</body>
</html>
