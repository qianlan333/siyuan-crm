version: 1
owner: platform_foundation.auth_platform
deployment_model: single_tenant_private

credentials:
  - id: human_wecom_session
    principal_types: [human]
    upstream: wecom_oauth
    transport: secure_httponly_cookie
    server_storage: sha256_hmac_digest_only
    lifetime: 8h
    revocation: admin_users.session_version_and_session_revocation
    route_schemes: [human_session, human_or_service]
  - id: api_client_secret
    principal_types: [api_client, service]
    transport: tls_basic_or_form_to_oauth_token
    server_storage: scrypt_verifier_only
    source_storage: file_secret_store
    rotation: increments_auth_version
    route_schemes: [client_credentials]
  - id: api_access_jwt
    principal_types: [api_client, service]
    transport: authorization_bearer_header
    server_storage: not_persisted
    lifetime: 30m_default_60m_max
    required_claims: [iss, aud, sub, client_id, scope, iat, exp, jti, auth_version]
    revocation: enabled_and_auth_version_registry_check
    route_schemes: [api_client_jwt, human_or_service]
  - id: aicrm_webhook_hmac
    principal_types: [api_client]
    transport_headers: [X-AICRM-Client-Id, X-AICRM-Timestamp, X-AICRM-Event-Id, X-AICRM-Signature]
    canonical_message: timestamp_newline_event_id_newline_raw_body
    server_storage: file_secret_store_reference
    replay_storage: auth_webhook_replay
    route_schemes: [webhook_hmac]
  - id: admin_action_grant
    principal_types: [human]
    transport: X-Admin-Action-Token_header_or_same_origin_form
    server_storage: not_persisted
    lifetime: 10m_max
    binding: session_capability_method_route_action
  - id: sidebar_owner_grant
    principal_types: [human]
    transport: X-AICRM-Sidebar-Owner-Token_header
    binding: wecom_sidebar_session_corp_owner_customer
    route_schemes: [sidebar_grant]
  - id: questionnaire_result_grant
    principal_types: [public]
    transport: secure_httponly_cookie
    url_credential: false
    route_schemes: [public_result_grant]
  - id: product_owner_context
    principal_types: [public]
    initial_transport: url_fragment_then_same_origin_post
    steady_transport: secure_httponly_cookie
    url_credential: false

provider_native_exemptions:
  - wecom_oauth_and_callbacks
  - wechat_pay_notifications
  - wechat_shop_callbacks
  - alipay_notifications
  - wechat_public_account_oauth

forbidden_runtime_contracts:
  environment_keys:
    - CRON_SECRET
    - AUTOMATION_INTERNAL_API_TOKEN
    - IDENTITY_INTERNAL_API_TOKEN
    - ARCHIVE_INTERNAL_API_TOKEN
    - GROUP_BROADCAST_INTERNAL_API_TOKEN
    - CALLBACK_INTERNAL_API_TOKEN
    - MCP_BEARER_TOKEN
    - AICRM_AI_AUDIENCE_API_TOKEN
    - AICRM_AI_AUDIENCE_SPEC_API_TOKEN
    - AICRM_INTERNAL_SERVICE_TOKEN
    - AICRM_AUTOMATION_WORKER_TOKEN
    - AICRM_ARCHIVE_WORKER_TOKEN
    - AICRM_CALLBACK_WORKER_TOKEN
    - AICRM_GROUP_BROADCAST_TOKEN
    - AICRM_IDENTITY_TOKEN
    - AICRM_AI_AUDIENCE_INBOUND_SECRET
    - AICRM_AI_AUDIENCE_INBOUND_WEBHOOK_SECRET
    - AICRM_AUTOMATION_AGENT_INBOUND_TOKEN
    - AICRM_AUTOMATION_AGENT_WEBHOOK_SECRET
    - AUTOMATION_ACTIVATION_WEBHOOK_TOKEN
    - AICRM_EXTERNAL_CAMPAIGN_TOKEN
    - AICRM_EXTERNAL_EFFECT_WEBHOOK_SECRET
    - AICRM_EXTERNAL_EFFECT_WEBHOOK_SIGNING_SECRET
    - OPENCLAW_QUESTIONNAIRE_BEARER_TOKEN
    - ADMIN_BREAK_GLASS_PASSWORD_HASH
    - AICRM_AUTH_TOKEN_HASH_PEPPER
    - AICRM_AUTH_OIDC_SIGNING_PRIVATE_KEY
    - AICRM_AUTH_OIDC_SIGNING_KEY_ID
    - AICRM_AUTH_HTTP_SIGNATURE_CLIENT_ID
    - AICRM_AUTH_HTTP_SIGNATURE_KEY_ID
    - AICRM_AUTH_HTTP_SIGNATURE_PRIVATE_KEY
    - AICRM_AUTH_MTLS_CERT_FILE
    - AICRM_AUTH_MTLS_KEY_FILE
  route_schemes:
    - oauth_access_token
    - oauth_context
    - oauth_session
    - oauth_protocol
    - path_token
    - webhook_bearer
    - webhook_signature
  path_parameter_markers: [token, secret, credential, api_key, bearer]
  query_parameter_names: [token, access_token, bearer_token, api_key, secret, ctx, context_token]
