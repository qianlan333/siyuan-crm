version: 1

migration_guard:
  # PR #10 starts table lifecycle governance after the unionid identity closeout.
  # Future migrations after this baseline must register every newly created table here.
  new_table_registration_after: "0073_drop_hxc_snapshot_external_userid"
  migration_file_prefix_after: "0073"

legacy_production_table_defaults: &legacy_production_table_defaults
  lifecycle: legacy
  write_owner: legacy.production_runtime
  read_owners:
    - production compatibility and historical audit
  replacement: canonical Next owner must be assigned before mutation or retirement
  drop_candidate: false
  drop_after: ""
  runtime_entrypoints:
    - preserved production compatibility data
  migration_source: pre-convergence production schema
  pii_level: internal_contact
  guard_tests:
    - tests/test_data_table_lifecycle_guard.py
    - tests/test_data_health_checks.py::test_schema_drift_guard_reports_manifest_and_live_schema_mismatches
  notes: Explicitly registered production relation outside the converged Next schema. It may remain present or be removed by a separately reviewed migration, but it is no longer unmanaged drift.

