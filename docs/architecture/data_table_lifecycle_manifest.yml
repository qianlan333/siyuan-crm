      - tests/test_unionid_identity_refactor_schema.py::test_customer_status_baseline_tables_exist_in_fresh_schema
      - tests/test_data_table_lifecycle_guard.py
    notes: Fresh target schema baseline for unionid keyed customer status; no external_userid or mobile_snapshot columns.

