schema_version: 1
owner: shared_security
parent_issue: 72

product_boundary:
  user_visible_capability_delta: none
  new_product_routes_pages_menus: none
  new_business_models_tables: none

secret_defaults: &secret_defaults
  current_sources:
    - environment
    - app_settings
  target_provider: versioned_file_secret_store
  rotation_owner: platform_ops
  rollback: previous_secret_version

secret_keys:
  AUTOMATION_INTERNAL_API_TOKEN:
    <<: *secret_defaults
    purpose: automation_worker
    runtime_consumers:
      - aicrm_next.shared.internal_service_tokens
      - aicrm_next.platform_foundation.internal_events.api
      - aicrm_next.platform_foundation.external_effects.api
  IDENTITY_INTERNAL_API_TOKEN:
    <<: *secret_defaults
    purpose: identity
    runtime_consumers:
      - aicrm_next.shared.internal_service_tokens
      - aicrm_next.admin_auth.route_policy
  ARCHIVE_INTERNAL_API_TOKEN:
    <<: *secret_defaults
    purpose: archive
    runtime_consumers:
      - aicrm_next.shared.internal_service_tokens
      - aicrm_next.message_archive.api
      - scripts.run_incremental_archive_sync
  GROUP_BROADCAST_INTERNAL_API_TOKEN:
    <<: *secret_defaults
    purpose: group_broadcast
    runtime_consumers:
      - aicrm_next.shared.internal_service_tokens
      - aicrm_next.automation_engine.group_ops.broadcast
  CALLBACK_INTERNAL_API_TOKEN:
    <<: *secret_defaults
    purpose: callback
    runtime_consumers:
      - aicrm_next.shared.internal_service_tokens
      - aicrm_next.platform_foundation.webhook_inbox.api
  AUTOMATION_ACTIVATION_WEBHOOK_TOKEN:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.admin_config
  SECRET_KEY:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.shared.runtime
      - aicrm_next.admin_auth.service
      - aicrm_next.shared.signed_session
      - aicrm_next.questionnaire.oauth
      - aicrm_next.radar_links
  CRON_SECRET:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.admin_jobs.routes
  AICRM_NEXT_ACTION_TOKEN_SECRET:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.admin_auth.action_token
      - aicrm_next.admin_jobs.routes
  AICRM_QUESTIONNAIRE_OAUTH_STATE_SECRET:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.questionnaire.oauth
  AICRM_AI_AUDIENCE_API_TOKEN:
