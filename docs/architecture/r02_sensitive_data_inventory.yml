      - aicrm_next.integration_gateway.wecom_contact_callback_live_adapter
  AICRM_WECOM_CONTACT_CALLBACK_TOKEN:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.integration_gateway.wecom_contact_callback_live_adapter
  AICRM_WECOM_GROUP_SECRET:
    <<: *secret_defaults
