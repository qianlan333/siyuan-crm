    runtime_consumers:
      - aicrm_next.shared.runtime
      - aicrm_next.commerce.wechat_shop_signature
      - aicrm_next.commerce.wechat_shop_service

api_client_credential_policy:
  exact_purpose_required: true
  cross_purpose_replay: deny
  route_policy_field: client_purpose
  token_endpoint: /oauth/token
  access_token_type: signed_jwt
  default_ttl_seconds: 1800
  maximum_ttl_seconds: 3600
  refresh_tokens: disabled
  client_secret_storage: strong_hash_only
  source_secret_storage: versioned_file_secret_store
  legacy_shared_bearer_fallback: disabled

pii_audit_defaults:
  customer:
    purpose: customer_record_access
    audit_mode: required
    scope_source: route_policy
    raw_payload_allowed: false
  sensitive:
    purpose: sensitive_record_access
    audit_mode: required
    scope_source: resource_fingerprint
    raw_payload_allowed: false
  financial:
    purpose: financial_record_access
    audit_mode: required
    scope_source: resource_fingerprint
    raw_payload_allowed: false

pii_route_overrides:
  - path_prefix: /api/identity
    purpose: identity_resolution
    audit_mode: required_fail_closed
    scope_source: resource_fingerprint
    raw_payload_allowed: false
  - path_prefix: /api/messages
    purpose: message_content_access
    audit_mode: required_fail_closed
    scope_source: resource_fingerprint
    raw_payload_allowed: false
  - path_prefix: /api/archive
    purpose: message_archive_access
    audit_mode: required_fail_closed
    scope_source: resource_fingerprint
    raw_payload_allowed: false
  - path_prefix: /api/admin/questionnaires
    purpose: questionnaire_response_access
    audit_mode: required_fail_closed
    scope_source: resource_fingerprint
    raw_payload_allowed: false
  - path_prefix: /api/h5/questionnaires
    purpose: questionnaire_self_service_access
    audit_mode: required
    scope_source: resource_fingerprint
    raw_payload_allowed: false
  - path_prefix: /api/admin/radar-links
    purpose: radar_event_access
    audit_mode: required_fail_closed
    scope_source: resource_fingerprint
    raw_payload_allowed: false
  - route_names:
      - class_user_management_export
      - export_questionnaire
      - export_radar_link_events
      - export_wechat_admin_orders
      - create_admin_export
      - get_admin_export
      - user_ops_export_preview
      - user_ops_export_stub
    purpose: pii_export
    audit_mode: required_fail_closed
    scope_source: resource_fingerprint
    raw_payload_allowed: false
  - route_names:
      - api_admin_jobs_order_identity_repair_run
      - repair_entry
    purpose: identity_forced_repair
    audit_mode: required_fail_closed
    scope_source: resource_fingerprint
    raw_payload_allowed: false

outbound_webhook_callers:
  - source: aicrm_next.platform_foundation.external_effects.adapters.WebhookAdapter
    dispatch_owner: aicrm_next.external_push.https_transport
    redirect_policy: deny
    dns_policy: resolve_validate_pin
    real_execution_change: none
  - source: aicrm_next.external_push.service
    dispatch_owner: aicrm_next.external_push.https_transport
    redirect_policy: deny
    dns_policy: resolve_validate_pin
    real_execution_change: none
  - source: aicrm_next.commerce.external_push_admin
    dispatch_owner: aicrm_next.external_push.https_transport
    redirect_policy: deny
    dns_policy: resolve_validate_pin
    real_execution_change: none
  - source: aicrm_next.questionnaire.external_push
    dispatch_owner: aicrm_next.external_push.https_transport
    redirect_policy: deny
    dns_policy: resolve_validate_pin
    real_execution_change: none
