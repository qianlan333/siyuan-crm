      - aicrm_next.integration_gateway.wecom_customer_group_client
      - aicrm_next.integration_gateway.wecom_media_upload_client
  AICRM_WECOM_MEDIA_SECRET:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.integration_gateway.wecom_media_upload_client
  AICRM_WECOM_OPERATION_MEMBERS_SECRET:
    <<: *secret_defaults
