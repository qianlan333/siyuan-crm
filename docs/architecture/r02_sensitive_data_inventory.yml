schema_version: 1
owner: shared_security
parent_issue: 72

product_boundary:
  user_visible_capability_delta: none
  new_product_routes_pages_menus: none
  new_business_models_tables: none

secret_defaults: &secret_defaults
  current_sources:
    - environment
    - app_settings
  target_provider: versioned_file_secret_store
  rotation_owner: platform_ops
  rollback: previous_secret_version

secret_keys:
  SECRET_KEY:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.shared.runtime
      - aicrm_next.admin_auth.service
      - aicrm_next.shared.signed_session
      - aicrm_next.questionnaire.oauth
      - aicrm_next.radar_links
  AICRM_NEXT_ACTION_TOKEN_SECRET:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.admin_auth.action_token
      - aicrm_next.admin_jobs.routes
  AICRM_AUTH_SESSION_HASH_PEPPER:
    <<: *secret_defaults
    purpose: server_session_hashing
    runtime_consumers:
      - aicrm_next.platform_foundation.auth_platform.sessions
      - scripts.ops.bootstrap_auth_clients
      - scripts.ops.check_auth_readiness
  AICRM_AUTH_JWT_SIGNING_KEY:
    <<: *secret_defaults
    purpose: api_access_jwt_signing
    runtime_consumers:
      - aicrm_next.platform_foundation.auth_platform.service
      - scripts.ops.bootstrap_auth_clients
      - scripts.ops.check_auth_readiness
  AICRM_QUESTIONNAIRE_OAUTH_STATE_SECRET:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.questionnaire.oauth
  AICRM_AI_AUDIENCE_AGENT_API_KEY:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.ai_audience_ops.agent_gateway
  AICRM_RUNTIME_V2_AGENT_API_KEY:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.ai_audience_ops.agent_gateway
  AICRM_MEDIA_UPLOAD_PROVIDER_SECRET:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.integration_gateway.media_live_adapter
  AICRM_OAUTH_IDENTITY_APP_SECRET:
    <<: *secret_defaults
    runtime_consumers:
      - aicrm_next.integration_gateway.oauth_identity_live_adapter
  AICRM_PAYMENT_COMMERCE_PROVIDER_SECRET:
