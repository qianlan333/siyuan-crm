let active='profile',matType='image';
function boot(){document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class='tab ${t[0]===active?'active':''}' onclick='switchTab(&apos;${t[0]}&apos;)'>${t[1]}</button>`).join('');render()}
function switchTab(k){active=k;boot()}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>el.classList.remove('show'),1600)}
function panel(title,body){return `<section class='panel'><div class='head'><h2>${title}</h2></div>${body}</section>`}
function render(){const c=document.getElementById('content');if(active==='profile')c.innerHTML=renderProfile();if(active==='forms')c.innerHTML=renderForms();if(active==='products')c.innerHTML=renderProducts();if(active==='orders')c.innerHTML=renderOrders();if(active==='materials')c.innerHTML=renderMaterials();if(active==='messages')c.innerHTML=renderMessages()}
function optionGroup(options,value,onClick){return `<div class='option-list'>${options.map(x=>`<button class='option ${x===value?'active':''}' onclick='${onClick}(&apos;${x}&apos;)'>${x}</button>`).join('')}</div>`}
function setSource(v){data.profile.source=v;render()}
function setIndustry(v){data.profile.industry=v;render()}
function renderProfile(){const p=data.profile;return panel('核心画像',`<div class='editor'><div class='field'><div class='field-title'>用户来源</div>${optionGroup(p.sourceOptions,p.source,'setSource')}</div><div class='field'><div class='field-title'>行业信息</div>${optionGroup(p.industryOptions,p.industry,'setIndustry')}</div><div class='field'><div class='field-title'>行业具体描述</div><textarea class='textarea' oninput='data.profile.industryDesc=this.value'>${p.industryDesc}</textarea></div><div class='field'><div class='field-title'>需求、卡点、跟进状态</div><textarea class='textarea' oninput='data.profile.needs=this.value'>${p.needs}</textarea></div></div>`)}
function renderForms(){return panel('问卷',data.forms.map((f,i)=>`<article class='card' id='form${i}'><div class='card-title'><div><h3>${f.name}</h3><div class='mini'>${f.time} · ${f.count}</div></div></div><div class='row-actions'><button class='btn primary' onclick='toggleCard(&apos;form${i}&apos;)'>查看答案</button></div><div class='questions'>${f.qs.map(q=>`<div class='question'><b>${q[0]}</b><em>${q[1]}</em></div>`).join('')}</div></article>`).join(''))}
function renderProducts(){return panel('商品',data.products.map(p=>`<article class='card'><div class='card-title'><h3>${p[0]}</h3><div class='price'>${p[1]}</div></div><div class='row-actions'><button class='btn primary' onclick='toast(&apos;已模拟发送商品介绍&apos;)'>发送介绍</button><button class='btn ghost' onclick='toast(&apos;打开商品详情&apos;)'>查看详情</button></div></article>`).join(''))}
function renderOrders(){return panel('订单',data.orders.map(o=>`<article class='card'><div class='card-title'><div><h3>${o.item}</h3><div class='mini'>${o.id}</div></div><div class='price'>${o.amount}</div></div><div class='kv'><span>状态</span><strong>${o.state}</strong><span>时间</span><strong>${o.time}</strong></div><div class='row-actions'><button class='btn primary' onclick='toast(&apos;打开订单详情&apos;)'>查看详情</button></div></article>`).join(''))}
function renderMaterials(){const label={image:'图片素材',mini:'小程序素材',pdf:'PDF素材'};const thumb={image:'图',mini:'小',pdf:'PDF'};const rows=data.materials.filter(m=>m.type===matType);return panel('素材',`<div class='seg'>${['image','mini','pdf'].map(t=>`<button class='${matType===t?'active':''}' onclick='matType=&apos;${t}&apos;;render()'>${label[t]}</button>`).join('')}</div>${rows.map(m=>`<article class='card material'><div class='thumb ${m.type==='mini'?'mini-program':m.type}'>${thumb[m.type]}</div><div><h3>${m.title}</h3><div class='tags'>${m.tags.map(t=>`<span class='tag'>${t}</span>`).join('')}</div></div><button class='btn primary' onclick='toast(&apos;已模拟发送素材&apos;)'>发给客户</button></article>`).join('')}`)}
function renderMessages(){const rows=data.messages.filter(m=>m.staff!==currentStaff).sort((a,b)=>a.time.localeCompare(b.time)).slice(-20);return panel('其他客服的聊天记录',`<div class='timeline'>${rows.map(m=>`<article class='msg'><div class='msg-meta'><span>${m.time}</span><span>${m.scene}</span></div><div class='msg-title'>${m.scene==='私聊'?`客户与 ${m.staff} 私聊`:`${m.scene} · ${m.sender}`}</div>${m.type==='image'?`<div class='imgmsg'><div class='imgph'>图</div><div class='txt'>${m.content}</div></div>`:`<div class='txt'>${m.sender}：${m.content}</div>`}</article>`).join('')}</div>`)}
function toggleCard(id){document.getElementById(id).classList.toggle('open')}boot();
