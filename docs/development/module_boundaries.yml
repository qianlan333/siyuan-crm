api_import_rules:
  api_file_globs:
    - aicrm_next/*/api.py
    - aicrm_next/**/*api*.py
    - aicrm_next/**/*pages*.py
  api_semantic_imports:
    - fastapi.APIRouter
  forbidden_cross_context_modules:
    - repo
    - repository
    - repositories
    - postgres_repo
    - service
  allowed_imports: []

forbidden_legacy_markers:
  - legacy_flask
  - openclaw_service
  - forward_to_legacy_flask
  - production_compat

legacy_allowlist:
  - path: aicrm_next/customer_tags/wecom_tag_live_adapter.py
    rule: forbidden_legacy_marker
    marker: production_compat
    owner: customer_tags
    reason: Historical audit payload field confirms this adapter does not change retired compatibility runtime.
    matches:
      - '"production_compat_changed": False,'
