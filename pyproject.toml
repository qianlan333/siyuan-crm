[tool.ruff]
target-version = "py310"
line-length = 160
extend-exclude = [".venv310", "node_modules"]

[tool.ruff.lint]
select = ["E9", "F"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
follow_imports = "silent"
pretty = true
show_error_codes = true
exclude = "^(\\.venv310|node_modules)/"
