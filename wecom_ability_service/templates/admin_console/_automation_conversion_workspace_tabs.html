<nav class="ac-workspace-tabs" aria-label="自动化转化工作面导航">
  {% for item in workspace_tabs %}
  <a class="ac-workspace-tab{% if item.active %} is-active{% endif %}" href="{{ item.href }}">
    <span class="ac-workspace-tab__eyebrow">自动化转化工作台</span>
    <strong class="ac-workspace-tab__title">{{ item.label }}</strong>
    <span class="ac-workspace-tab__summary">{{ item.summary }}</span>
  </a>
  {% endfor %}
</nav>
