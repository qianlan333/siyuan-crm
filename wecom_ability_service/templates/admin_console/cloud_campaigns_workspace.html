{% extends "admin_console/base.html" %}

{% block head_extra %}
<script src="{{ url_for('static', filename='admin_console/image_picker.js') }}"></script>
{% endblock %}

{% block content %}
<div class="cloud-camp-page" data-cloud-camp-root>
  <section class="admin-card">
    <header class="admin-card-head">
      <h2 class="admin-card-title">运营计划审阅</h2>
      <div class="cloud-camp-toolbar">
        <select id="cloud-camp-filter-review" class="admin-input">
          <option value="">全部审阅状态</option>
          <option value="pending_review">待审阅</option>
          <option value="approved">已批准</option>
          <option value="rejected">已拒绝</option>
        </select>
        <select id="cloud-camp-filter-run" class="admin-input">
          <option value="">全部运行状态</option>
          <option value="draft">草稿</option>
          <option value="active">运行中</option>
          <option value="paused">暂停</option>
          <option value="finished">已结束</option>
          <option value="cancelled">已撤销</option>
        </select>
        <button class="admin-button admin-button--primary" id="cloud-camp-refresh">刷新</button>
      </div>
    </header>
    <table class="admin-table cloud-camp-table">
      <thead><tr>
        <th>运营计划</th><th>意图</th><th>分层</th><th>成员</th>
        <th>审阅</th><th>运行</th><th>更新时间</th><th>操作</th>
      </tr></thead>
      <tbody id="cloud-camp-tbody"><tr><td colspan="8">加载中…</td></tr></tbody>
    </table>
  </section>

  <section class="admin-card" hidden id="cloud-camp-detail-section">
    <header class="admin-card-head cloud-camp-detail-head">
      <div class="cloud-camp-detail-head-left">
        <h3 class="admin-card-title">
          <span id="cloud-camp-detail-name"></span>
          <span class="cloud-orch-status-chip" id="cloud-camp-detail-review"></span>
          <span class="cloud-orch-status-chip" id="cloud-camp-detail-run"></span>
        </h3>
        <span class="cloud-orch-trace-id" id="cloud-camp-detail-trace"></span>
      </div>
      <div class="cloud-camp-actions-menu">
        <button class="admin-button admin-button--ghost cloud-camp-more-btn" id="cloud-camp-more">⋯ 更多</button>
        <div class="cloud-camp-more-pop" id="cloud-camp-more-pop" hidden>
          <button class="cloud-camp-more-item" id="cloud-camp-pause">暂停</button>
          <button class="cloud-camp-more-item" id="cloud-camp-edit" title="编辑功能开发中" disabled>编辑</button>
          <button class="cloud-camp-more-item cloud-camp-danger" id="cloud-camp-delete">删除</button>
        </div>
      </div>
    </header>
    <div id="cloud-camp-detail-body" class="cloud-camp-detail-body"></div>
    <footer class="cloud-camp-detail-footer">
      <button class="admin-button admin-button--primary" id="cloud-camp-start">启动</button>
      <button class="admin-button admin-button--ghost cloud-camp-reject" id="cloud-camp-reject">拒绝</button>
    </footer>
  </section>

  <div class="cloud-camp-drawer" id="cloud-camp-members-drawer" hidden>
    <div class="cloud-camp-drawer-mask" data-close></div>
    <aside class="cloud-camp-drawer-panel">
      <header>
        <strong id="cloud-camp-drawer-title">成员明细</strong>
        <button class="cloud-camp-drawer-close" data-close>×</button>
      </header>
      <div class="cloud-camp-drawer-toolbar">
        <select id="cloud-camp-drawer-status" class="admin-input">
          <option value="">全部状态</option>
          <option value="pending">待发送</option>
          <option value="sent">已发送</option>
          <option value="replied">已回复</option>
          <option value="stopped">已停止</option>
          <option value="failed">失败</option>
        </select>
        <span class="cloud-camp-drawer-count" id="cloud-camp-drawer-count"></span>
      </div>
      <div class="cloud-camp-drawer-body" id="cloud-camp-drawer-body">加载中…</div>
    </aside>
  </div>
</div>
<style>
.cloud-camp-page { display:flex; flex-direction:column; gap:24px; padding-bottom:48px; }
.cloud-camp-toolbar { display:flex; gap:8px; margin-top:8px; }
.cloud-camp-toolbar select { max-width:160px; }
.cloud-camp-table th, .cloud-camp-table td { padding:8px 12px; vertical-align:top; }
.cloud-camp-name { font-weight:500; color:#1d1d1f; font-size:13px; line-height:1.4; }
.cloud-camp-code { display:inline-block; margin-top:4px; color:#a0a4ad; font-size:11px; background:transparent; padding:0; }
.cloud-camp-intent-cell { max-width:520px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.45; color:#3a3a3c; font-size:13px; }
.cloud-orch-status-chip { display:inline-block; padding:2px 8px; border-radius:10px; background:#eef0f4; font-size:12px; color:#5b626f; margin-left:8px; }
.cloud-orch-status-chip.pending_review, .cloud-orch-status-chip.draft { background:#fff7e6; color:#a06400; }
.cloud-orch-status-chip.approved, .cloud-orch-status-chip.active { background:#e9f7ee; color:#287a3c; }
.cloud-orch-status-chip.paused { background:#eef0f4; color:#5b626f; }
.cloud-orch-status-chip.rejected, .cloud-orch-status-chip.cancelled, .cloud-orch-status-chip.finished { background:#fce4e4; color:#a02929; }
.cloud-orch-trace-id { font-family:ui-monospace,Menlo,monospace; font-size:11px; color:#888; display:block; margin-top:4px; }

.cloud-camp-detail-head { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
.cloud-camp-detail-head-left { flex:1; min-width:0; }
.cloud-camp-actions-menu { position:relative; }
.cloud-camp-more-btn { padding:4px 10px; }
.cloud-camp-more-pop { position:absolute; right:0; top:32px; background:#fff; border:1px solid #e5e7eb; border-radius:6px; box-shadow:0 8px 20px rgba(0,0,0,0.06); min-width:120px; z-index:5; padding:4px 0; }
.cloud-camp-more-item { display:block; width:100%; text-align:left; padding:8px 14px; border:0; background:transparent; cursor:pointer; font-size:13px; color:#1d1d1f; }
.cloud-camp-more-item:hover:not([disabled]) { background:#f5f6f8; }
.cloud-camp-more-item[disabled] { color:#bbb; cursor:not-allowed; }
.cloud-camp-more-item.cloud-camp-danger { color:#a02929; }

.cloud-camp-detail-body { display:flex; flex-direction:column; gap:20px; }
.cloud-camp-section { border:1px solid #ececec; border-radius:8px; padding:14px 16px; background:#fff; }
.cloud-camp-section h4 { margin:0 0 10px; font-size:14px; color:#1d1d1f; }
.cloud-camp-section .intent-text { color:#3a3a3c; font-size:13px; line-height:1.6; white-space:pre-wrap; }

.cloud-camp-segment-card { border:1px solid #e5e7eb; border-radius:8px; padding:12px 14px; background:#fafbfc; margin-bottom:12px; }
.cloud-camp-segment-card:last-child { margin-bottom:0; }
.cloud-camp-segment-card .seg-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px; }
.cloud-camp-segment-card .seg-head h5 { margin:0; font-size:14px; }
.cloud-camp-segment-card .seg-meta { font-size:12px; color:#888; }
.cloud-camp-step-row { background:#fff; border:1px solid #e5e7eb; border-radius:6px; padding:10px 12px; margin-top:8px; }
.cloud-camp-step-row .step-head { display:flex; gap:10px; align-items:baseline; margin-bottom:6px; }
.cloud-camp-step-row .step-day { font-weight:600; color:#2c5cdb; }
.cloud-camp-step-row .step-time { color:#888; font-size:12px; }
.cloud-camp-step-row .step-stop { font-size:11px; color:#287a3c; background:#e9f7ee; padding:1px 6px; border-radius:8px; }
.cloud-camp-step-row .step-text { font-size:13px; line-height:1.6; color:#1d1d1f; white-space:pre-wrap; word-break:break-word; }
.cloud-camp-step-row .step-image { margin-top:8px; font-size:12px; color:#aaa; }
.cloud-camp-step-empty { color:#a02929; font-size:13px; padding:8px 0; }
.cloud-camp-step-edit { margin-left:auto; padding:2px 10px; border:1px solid #d3dcf2; background:#fff; color:#2c5cdb; font-size:12px; border-radius:4px; cursor:pointer; }
.cloud-camp-step-edit:hover { background:#eef3fb; }
.cloud-camp-step-delete { padding:2px 10px; border:1px solid #f3c7c7; background:#fff; color:#a02929; font-size:12px; border-radius:4px; cursor:pointer; margin-left:6px; }
.cloud-camp-step-delete:hover { background:#fdecec; }
.cloud-camp-step-add-row { margin-top:10px; padding-top:8px; border-top:1px dashed #ececec; text-align:center; }
.cloud-camp-step-add { padding:6px 14px; border:1px dashed #c7d3f0; background:transparent; color:#2c5cdb; font-size:12px; border-radius:4px; cursor:pointer; }
.cloud-camp-step-add:hover { background:#eef3fb; border-style:solid; }
.cloud-camp-step-edit-form { display:flex; flex-direction:column; gap:10px; }
.cloud-camp-step-edit-form .edit-grid { display:flex; gap:14px; align-items:center; flex-wrap:wrap; font-size:13px; color:#5b626f; }
.cloud-camp-step-edit-form .edit-grid label { display:flex; align-items:center; gap:6px; }
.cloud-camp-step-edit-form .edit-grid input[type=number] { width:80px; }
.cloud-camp-step-edit-form .edit-grid input[type=time] { width:120px; }
.cloud-camp-step-edit-form .edit-stop-on-reply-label { display:inline-flex; align-items:center; gap:6px; }
.cloud-camp-step-edit-form .edit-block { display:flex; flex-direction:column; gap:6px; font-size:13px; color:#5b626f; }
.cloud-camp-step-edit-form textarea { width:100%; font-family:inherit; resize:vertical; padding:8px 10px; border:1px solid #d6dae0; border-radius:4px; box-sizing:border-box; }
.cloud-camp-step-edit-form .edit-actions { display:flex; gap:8px; justify-content:flex-end; }
.cloud-camp-step-edit-form .edit-image-upload { display:flex; align-items:center; gap:10px; padding:6px 0; font-size:12px; color:#5b626f; }
.cloud-camp-step-edit-form .edit-image-upload input[type=file] { font-size:12px; }
.cloud-camp-step-edit-form .edit-image-upload-status { color:#287a3c; }

.cloud-camp-members-summary { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
.cloud-camp-members-total { font-size:18px; font-weight:600; color:#1d1d1f; }
.cloud-camp-members-status { display:flex; gap:6px; flex-wrap:wrap; }
.cloud-camp-members-status .chip { font-size:12px; padding:3px 8px; border-radius:10px; background:#eef0f4; color:#5b626f; }

.cloud-camp-detail-footer { display:flex; gap:12px; padding-top:16px; border-top:1px dashed #e5e7eb; margin-top:16px; }
.cloud-camp-reject { margin-left:auto; }

.cloud-camp-drawer { position:fixed; inset:0; z-index:50; display:flex; }
.cloud-camp-drawer[hidden] { display:none; }  /* class 的 display:flex 优先级高于 [hidden] 默认样式，必须显式覆盖否则抽屉一直显示 */
.cloud-camp-drawer-mask { flex:1; background:rgba(0,0,0,0.3); }
.cloud-camp-drawer-panel { width:520px; max-width:96vw; background:#fff; height:100%; display:flex; flex-direction:column; box-shadow:-2px 0 16px rgba(0,0,0,0.08); }
.cloud-camp-drawer-panel header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; border-bottom:1px solid #f0f0f0; }
.cloud-camp-drawer-close { border:0; background:transparent; font-size:22px; cursor:pointer; color:#888; line-height:1; }
.cloud-camp-drawer-toolbar { display:flex; align-items:center; gap:10px; padding:10px 18px; border-bottom:1px solid #f0f0f0; }
.cloud-camp-drawer-count { color:#888; font-size:12px; }
.cloud-camp-drawer-body { flex:1; overflow:auto; padding:8px 0; }
.cloud-camp-member-row { display:grid; grid-template-columns:1fr auto; padding:10px 18px; border-bottom:1px solid #f5f5f5; gap:10px; align-items:center; }
.cloud-camp-member-row:hover { background:#fafbfc; }
.cloud-camp-member-meta { font-size:12px; color:#888; margin-top:3px; line-height:1.5; }
.cloud-camp-member-meta code { background:#f0f0f3; padding:1px 5px; border-radius:3px; font-size:11px; }
.cloud-camp-member-action a { font-size:12px; color:#2c5cdb; text-decoration:none; padding:4px 10px; border:1px solid #d3dcf2; border-radius:4px; }
.cloud-camp-member-action a:hover { background:#eef3fb; }
</style>
<script>
(function () {
  const root = document.querySelector('[data-cloud-camp-root]');
  if (!root) return;
  const tbody = root.querySelector('#cloud-camp-tbody');
  const detailSection = root.querySelector('#cloud-camp-detail-section');
  const detailName = root.querySelector('#cloud-camp-detail-name');
  const detailReview = root.querySelector('#cloud-camp-detail-review');
  const detailRun = root.querySelector('#cloud-camp-detail-run');
  const detailTrace = root.querySelector('#cloud-camp-detail-trace');
  const detailBody = root.querySelector('#cloud-camp-detail-body');
  const reviewSel = root.querySelector('#cloud-camp-filter-review');
  const runSel = root.querySelector('#cloud-camp-filter-run');
  const refreshBtn = root.querySelector('#cloud-camp-refresh');
  const startBtn = root.querySelector('#cloud-camp-start');
  const rejectBtn = root.querySelector('#cloud-camp-reject');
  const moreBtn = root.querySelector('#cloud-camp-more');
  const morePop = root.querySelector('#cloud-camp-more-pop');
  const pauseBtn = root.querySelector('#cloud-camp-pause');
  const deleteBtn = root.querySelector('#cloud-camp-delete');

  const drawer = root.querySelector('#cloud-camp-members-drawer');
  const drawerTitle = root.querySelector('#cloud-camp-drawer-title');
  const drawerStatus = root.querySelector('#cloud-camp-drawer-status');
  const drawerCount = root.querySelector('#cloud-camp-drawer-count');
  const drawerBody = root.querySelector('#cloud-camp-drawer-body');

  let currentCode = '';

  const fmt = s => (s == null ? '' : String(s));
  const escapeHtml = s => fmt(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  // 状态英文 → 中文。CSS class 还是用英文（用于配色），只换显示文案
  const REVIEW_STATUS_LABEL = {
    pending_review: '待审阅',
    approved: '已批准',
    rejected: '已拒绝',
    draft: '草稿',
  };
  const RUN_STATUS_LABEL = {
    draft: '草稿',
    active: '运行中',
    paused: '已暂停',
    finished: '已结束',
    cancelled: '已撤销',
  };
  const reviewLabel = s => REVIEW_STATUS_LABEL[s] || fmt(s);
  const runLabel = s => RUN_STATUS_LABEL[s] || fmt(s);

  // 后端 jsonify 把 datetime 序列化成 RFC1123 ("Sun, 10 May 2026 01:23:45 GMT")
  // 也可能是 ISO ("2026-05-10T01:23:45Z")。两种都丢给 Date 都能解，最后统一渲染
  // 成 "YYYY-MM-DD"（只展示年月日，按用户要求）
  function formatYMD(value) {
    if (!value) return '';
    const d = new Date(value);
    if (isNaN(d.getTime())) return fmt(value).slice(0, 10);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  let _miniprogramLibraryCache = null;
  async function loadMiniprogramLibrary() {
    if (_miniprogramLibraryCache) return _miniprogramLibraryCache;
    try {
      const resp = await fetch('/api/admin/miniprogram-library', { credentials: 'same-origin' });
      const data = await resp.json();
      _miniprogramLibraryCache = data.ok ? (data.items || []) : [];
    } catch { _miniprogramLibraryCache = []; }
    return _miniprogramLibraryCache;
  }
  function attachMiniprogramPicker(rowEl) {
    const idsInput = rowEl.querySelector('.edit-miniprogram-ids');
    const listEl = rowEl.querySelector('.edit-miniprogram-list');
    const summaryEl = rowEl.querySelector('.edit-miniprogram-summary');
    const pickBtn = rowEl.querySelector('.edit-pick-miniprogram');
    if (!idsInput || !pickBtn) return;
    function getIds() { try { return JSON.parse(idsInput.value || '[]'); } catch { return []; } }
    async function render() {
      const ids = getIds();
      const items = await loadMiniprogramLibrary();
      summaryEl.textContent = '已选 ' + ids.length + ' 个';
      if (!ids.length) { listEl.innerHTML = '<div style="font-size:12px;color:#aaa;">暂未选择小程序</div>'; return; }
      listEl.innerHTML = ids.map(function (id, idx) {
        const it = items.find(function (x) { return x.id === id; }) || { appid: '(未知)', title: '#' + id };
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border:1px solid #e5e7eb;border-radius:4px;font-size:12px;">'
          + '<span><strong>' + escapeHtml(it.title || it.name || ('#' + id)) + '</strong> <span style="color:#888;">' + escapeHtml(it.appid) + ' · ' + escapeHtml(it.pagepath || '') + '</span></span>'
          + '<button type="button" class="admin-button admin-button--ghost" data-mp-remove="' + idx + '" style="font-size:11px;">移除</button>'
          + '</div>';
      }).join('');
      listEl.querySelectorAll('[data-mp-remove]').forEach(function (b) {
        b.addEventListener('click', function () {
          const cur = getIds();
          cur.splice(Number(b.getAttribute('data-mp-remove')), 1);
          idsInput.value = JSON.stringify(cur);
          render();
        });
      });
    }
    pickBtn.addEventListener('click', async function () {
      const items = await loadMiniprogramLibrary();
      if (!items.length) { alert('小程序素材库还是空的，先到 /admin/miniprogram-library 配置一条。'); return; }
      const existing = new Set(getIds());
      const choices = items.map(function (it) {
        const checked = existing.has(it.id) ? 'checked' : '';
        return '<label style="display:flex;gap:8px;align-items:center;padding:8px;border:1px solid #ddd;border-radius:6px;margin-bottom:6px;">'
          + '<input type="checkbox" data-mp-pick="' + it.id + '" ' + checked + '>'
          + '<span><strong>' + escapeHtml(it.title || it.name) + '</strong>'
          + '<br><small>' + escapeHtml(it.appid) + ' · ' + escapeHtml(it.pagepath) + '</small></span>'
          + '</label>';
      }).join('');
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9999;display:flex;align-items:center;justify-content:center;';
      wrap.innerHTML = '<div style="background:#fff;padding:16px;border-radius:8px;max-width:480px;width:90%;max-height:80vh;overflow:auto;">'
        + '<h3 style="margin:0 0 12px;">选择小程序卡片</h3>' + choices
        + '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">'
        + '<button class="admin-button admin-button--ghost" type="button" data-mp-cancel>取消</button>'
        + '<button class="admin-button admin-button--primary" type="button" data-mp-confirm>确定</button>'
        + '</div></div>';
      document.body.appendChild(wrap);
      wrap.querySelector('[data-mp-cancel]').addEventListener('click', function () { wrap.remove(); });
      wrap.querySelector('[data-mp-confirm]').addEventListener('click', function () {
        const picked = [];
        wrap.querySelectorAll('[data-mp-pick]:checked').forEach(function (cb) {
          picked.push(Number(cb.getAttribute('data-mp-pick')));
        });
        idsInput.value = JSON.stringify(picked);
        wrap.remove();
        render();
      });
    });
    render();
  }

  async function loadList() {
    const params = new URLSearchParams();
    if (reviewSel.value) params.set('review_status', reviewSel.value);
    if (runSel.value) params.set('run_status', runSel.value);
    const resp = await fetch('/api/admin/cloud-orchestrator/campaigns?' + params.toString());
    const data = await resp.json();
    if (!data.ok) return;
    tbody.innerHTML = '';
    if (!data.campaigns.length) {
      tbody.innerHTML = '<tr><td colspan="8">暂无运营计划</td></tr>';
      return;
    }
    for (const c of data.campaigns) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <div class="cloud-camp-name">${escapeHtml(c.display_name) || '<em>未命名</em>'}</div>
          <code class="cloud-camp-code">${escapeHtml(c.campaign_code).slice(0, 18)}</code>
        </td>
        <td><div class="cloud-camp-intent-cell" title="${escapeHtml(c.intent)}">${escapeHtml(c.intent)}</div></td>
        <td>${fmt(c.segment_count || 0)}</td>
        <td>${fmt(c.member_count || 0)}</td>
        <td><span class="cloud-orch-status-chip ${escapeHtml(c.review_status)}">${escapeHtml(reviewLabel(c.review_status))}</span></td>
        <td><span class="cloud-orch-status-chip ${escapeHtml(c.run_status)}">${escapeHtml(runLabel(c.run_status))}</span></td>
        <td>${escapeHtml(formatYMD(c.updated_at))}</td>
        <td><button class="admin-button admin-button--ghost" data-code="${escapeHtml(c.campaign_code)}">查看</button></td>
      `;
      tr.querySelector('button').addEventListener('click', e => loadDetail(e.currentTarget.dataset.code));
      tbody.appendChild(tr);
    }
  }

  async function loadDetail(code) {
    currentCode = code;
    const resp = await fetch('/api/admin/cloud-orchestrator/campaigns/' + encodeURIComponent(code));
    const data = await resp.json();
    if (!data.ok) { alert('找不到 Campaign'); return; }
    const overview = data.campaign;
    const camp = overview.campaign;
    detailSection.hidden = false;
    detailName.textContent = camp.display_name || camp.campaign_code;
    detailReview.className = 'cloud-orch-status-chip ' + escapeHtml(camp.review_status);
    detailReview.textContent = reviewLabel(camp.review_status);
    detailRun.className = 'cloud-orch-status-chip ' + escapeHtml(camp.run_status);
    detailRun.textContent = runLabel(camp.run_status);
    detailTrace.textContent = `code=${fmt(camp.campaign_code)}  trace=${fmt(camp.trace_id)}`;

    const sections = [];

    sections.push(`
      <div class="cloud-camp-section">
        <h4>意图</h4>
        <div class="intent-text">${escapeHtml(camp.intent)}</div>
      </div>
    `);

    const editable = ['draft', 'pending_review'].includes(camp.review_status) && ['draft', 'paused'].includes(camp.run_status);

    let segHtml = '';
    for (const seg of (overview.segments || [])) {
      let stepsHtml = '';
      const steps = seg.steps || [];
      if (!steps.length) {
        stepsHtml = `<div class="cloud-camp-step-empty">⚠️ 这个分层没有节奏，无法启动。请让 Agent 重新提交带 steps 的 propose_campaign。</div>`;
      } else {
        for (const step of steps) {
          const dayLabel = step.day_offset === 0 ? 'D+0（首日）' : `D+${step.day_offset}`;
          const stopChip = step.stop_on_reply ? '<span class="step-stop">回复后停止</span>' : '';
          // step.content_payload_json 可能是 dict（PG）或 string（SQLite），后端 assemble_campaign_overview 没解
          let payload = {};
          try {
            const raw = step.content_payload_json;
            if (raw && typeof raw === 'object') payload = raw;
            else if (typeof raw === 'string' && raw) payload = JSON.parse(raw);
          } catch { payload = {}; }
          const imageLibraryIds = Array.isArray(payload.image_library_ids) ? payload.image_library_ids : [];
          const legacyMediaIds = Array.isArray(payload.image_media_ids) ? payload.image_media_ids : [];
          const totalImages = imageLibraryIds.length + legacyMediaIds.length;
          const imageLine = totalImages
            ? `图片：${totalImages} 张${legacyMediaIds.length ? `（其中 ${legacyMediaIds.length} 张为老版直传 media_id）` : '（来自图片素材库）'}`
            : '图片：未配置';
          const editBtns = editable
            ? `<button class="cloud-camp-step-edit" data-step-index="${fmt(step.step_index)}">编辑</button>
               <button class="cloud-camp-step-delete" data-step-index="${fmt(step.step_index)}">删除</button>`
            : '';
          stepsHtml += `
            <div class="cloud-camp-step-row" data-step-row="${fmt(step.step_index)}">
              <div class="step-head">
                <span class="step-day">${escapeHtml(dayLabel)}</span>
                <span class="step-time">${escapeHtml(step.send_time || '10:00')}</span>
                ${stopChip}
                ${editBtns}
              </div>
              <div class="step-text">${escapeHtml(step.content_text || '')}</div>
              <div class="step-image">${imageLine}</div>
            </div>
          `;
        }
      }
      const addStepBtn = editable
        ? `<button class="cloud-camp-step-add" data-segment-id="${fmt(seg.campaign_segment_id)}">+ 新增节奏</button>`
        : '';
      segHtml += `
        <div class="cloud-camp-segment-card">
          <div class="seg-head">
            <h5>${escapeHtml(seg.label) || escapeHtml(seg.segment_name)}</h5>
            <span class="seg-meta">priority ${fmt(seg.priority)} · ${fmt(seg.allocated_count || 0)} 人 · code=${escapeHtml(seg.segment_code)}</span>
          </div>
          ${stepsHtml}
          ${addStepBtn ? `<div class="cloud-camp-step-add-row">${addStepBtn}</div>` : ''}
        </div>
      `;
    }
    sections.push(`
      <div class="cloud-camp-section">
        <h4>分层 + 节奏</h4>
        ${segHtml || '<em>未挂分层</em>'}
      </div>
    `);

    const total = overview.total_members || 0;
    const counts = overview.member_status_counts || {};
    const chipMap = {pending:'待发送', sent:'已发送', replied:'已回复', stopped:'已停止', failed:'失败'};
    const chips = Object.keys(counts).map(k => `<span class="chip">${escapeHtml(chipMap[k] || k)} ${fmt(counts[k])}</span>`).join('');
    sections.push(`
      <div class="cloud-camp-section">
        <h4>命中成员</h4>
        <div class="cloud-camp-members-summary">
          <div class="cloud-camp-members-total">${fmt(total)} 人</div>
          <div class="cloud-camp-members-status">${chips}</div>
          <button class="admin-button admin-button--ghost" id="cloud-camp-view-members">查看成员明细</button>
        </div>
      </div>
    `);

    detailBody.innerHTML = sections.join('');
    detailBody.querySelector('#cloud-camp-view-members')?.addEventListener('click', () => openMembersDrawer(camp.display_name || camp.campaign_code));
    // 给每个 step 卡片的「编辑」按钮挂事件
    detailBody.querySelectorAll('.cloud-camp-step-edit').forEach(btn => {
      btn.addEventListener('click', () => {
        const stepIndex = btn.dataset.stepIndex;
        const seg = (overview.segments || []).find(s => (s.steps || []).some(st => String(st.step_index) === String(stepIndex)));
        if (!seg) return;
        const step = seg.steps.find(st => String(st.step_index) === String(stepIndex));
        if (!step) return;
        openStepEditor(step, btn.closest('.cloud-camp-step-row'));
      });
    });
    // 「删除」节奏
    detailBody.querySelectorAll('.cloud-camp-step-delete').forEach(btn => {
      btn.addEventListener('click', async () => {
        const stepIndex = btn.dataset.stepIndex;
        if (!confirm(`确认删除 step ${stepIndex}？此操作不可撤销。`)) return;
        const resp = await fetch(`/api/admin/cloud-orchestrator/campaigns/${encodeURIComponent(currentCode)}/steps/${encodeURIComponent(stepIndex)}`, {
          method: 'DELETE',
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || !data.ok) { alert('删除失败：' + (data.error || `HTTP ${resp.status}`)); return; }
        loadDetail(currentCode);
      });
    });
    // 「+ 新增节奏」
    detailBody.querySelectorAll('.cloud-camp-step-add').forEach(btn => {
      btn.addEventListener('click', async () => {
        const segId = parseInt(btn.dataset.segmentId, 10);
        if (!segId) return;
        const resp = await fetch(`/api/admin/cloud-orchestrator/campaigns/${encodeURIComponent(currentCode)}/steps`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ campaign_segment_id: segId, day_offset: 0, send_time: '10:00', content_text: '', stop_on_reply: true }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || !data.ok) { alert('新增失败：' + (data.error || `HTTP ${resp.status}`)); return; }
        loadDetail(currentCode);
      });
    });

    const startable = ['draft', 'pending_review'].includes(camp.review_status) && ['draft', 'paused'].includes(camp.run_status);
    const hasSteps = (overview.segments || []).some(s => (s.steps || []).length > 0);
    startBtn.disabled = !startable || !hasSteps;
    startBtn.title = !hasSteps ? '请先让 Agent 提交带节奏的 propose_campaign' : '';
    rejectBtn.disabled = ['rejected','cancelled','finished'].includes(camp.review_status) || ['cancelled','finished'].includes(camp.run_status);
    pauseBtn.disabled = camp.run_status !== 'active';
    deleteBtn.disabled = camp.run_status === 'active';
  }

  startBtn.addEventListener('click', async () => {
    if (!currentCode) return;
    if (!confirm(`确认启动这个 Campaign 吗？启动后会按节奏自动推送，且不可撤回。`)) return;
    const operator = (window.prompt('确认人（仅做审计标记，可填昵称或工号）', 'ui_user') || '').trim();
    if (!operator) return;
    startBtn.disabled = true;
    const oldText = startBtn.textContent;
    startBtn.textContent = '启动中…';
    try {
      const resp1 = await fetch(`/api/admin/cloud-orchestrator/campaigns/${encodeURIComponent(currentCode)}/approve`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ operator }),
      });
      // 即使 500 也尝试解析 body 拿 error；之前只看 d.ok 在 500 时直接被忽略，用户什么都看不到
      const d1 = await resp1.json().catch(() => ({}));
      if (!resp1.ok || !d1.ok) {
        alert(`启动失败（签发授权环节）：${d1.error || `HTTP ${resp1.status}`}`);
        return;
      }
      const token = d1.approval && d1.approval.token;
      if (!token) { alert('未拿到授权 token'); return; }
      const resp2 = await fetch(`/api/admin/cloud-orchestrator/campaigns/${encodeURIComponent(currentCode)}/start`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ approval_token: token, human_approver: operator }),
      });
      const d2 = await resp2.json().catch(() => ({}));
      if (!resp2.ok || !d2.ok) {
        alert(`启动失败：${d2.error || `HTTP ${resp2.status}（看 server log / journalctl 或 query_recent_audit_logs 查 traceback）`}`);
        return;
      }
      alert(`已启动 ✓\n运行状态：${d2.campaign?.run_status || 'active'}\n下一次 cron 扫描时（约 1 分钟内）开始推送 D+0`);
      loadDetail(currentCode);
      loadList();
    } finally {
      startBtn.disabled = false;
      startBtn.textContent = oldText;
    }
  });

  rejectBtn.addEventListener('click', async () => {
    if (!currentCode) return;
    const reason = prompt('拒绝原因？（会写入审计日志）', '运营审阅未通过');
    if (reason === null) return;
    const resp = await fetch(`/api/admin/cloud-orchestrator/campaigns/${encodeURIComponent(currentCode)}/reject`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ reason }),
    });
    const data = await resp.json();
    if (!data.ok) { alert('操作失败'); return; }
    loadDetail(currentCode);
    loadList();
  });

  moreBtn.addEventListener('click', () => {
    morePop.hidden = !morePop.hidden;
  });
  document.addEventListener('click', (e) => {
    if (!morePop.contains(e.target) && e.target !== moreBtn) morePop.hidden = true;
  });

  pauseBtn.addEventListener('click', async () => {
    if (!currentCode) return;
    morePop.hidden = true;
    const reason = prompt('暂停原因？', '运营手动暂停');
    if (reason === null) return;
    await fetch(`/api/admin/cloud-orchestrator/campaigns/${encodeURIComponent(currentCode)}/pause`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ reason }),
    });
    loadDetail(currentCode);
    loadList();
  });

  deleteBtn.addEventListener('click', async () => {
    if (!currentCode) return;
    morePop.hidden = true;
    if (!confirm('永久删除这个 Campaign？包含所有节奏、命中成员、待发批次都会一并清空，且不可恢复。')) return;
    const resp = await fetch(`/api/admin/cloud-orchestrator/campaigns/${encodeURIComponent(currentCode)}`, {
      method: 'DELETE',
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok || !data.ok) {
      alert('删除失败：' + (data.error || `HTTP ${resp.status}`));
      return;
    }
    detailSection.hidden = true;
    currentCode = '';
    loadList();
  });

  // ----- step editor (inline) -----
  function openStepEditor(step, rowEl) {
    if (!rowEl) return;
    if (rowEl.dataset.editing === '1') return;
    rowEl.dataset.editing = '1';
    let payload = {};
    try {
      const raw = step.content_payload_json;
      if (raw && typeof raw === 'object') payload = raw;
      else if (typeof raw === 'string' && raw) payload = JSON.parse(raw);
    } catch { payload = {}; }
    // 兼容老数据：旧 step 用 image_media_ids（直接是企微 media_id）；新版用 image_library_ids（图片素材库 id）
    const imageLibraryIds = Array.isArray(payload.image_library_ids) ? payload.image_library_ids : [];
    const legacyMediaIds = Array.isArray(payload.image_media_ids) ? payload.image_media_ids : [];
    const miniprogramLibraryIds = Array.isArray(payload.miniprogram_library_ids) ? payload.miniprogram_library_ids : [];
    const originalHtml = rowEl.innerHTML;
    rowEl.innerHTML = `
      <div class="cloud-camp-step-edit-form">
        <div class="edit-grid">
          <label>D+
            <input type="number" min="0" max="365" class="admin-input edit-day-offset" value="${fmt(step.day_offset || 0)}">
          </label>
          <label>发送时间
            <input type="time" class="admin-input edit-send-time" value="${escapeHtml(step.send_time || '10:00')}">
          </label>
          <label class="edit-stop-on-reply-label">
            <input type="checkbox" class="edit-stop-on-reply" ${step.stop_on_reply ? 'checked' : ''}> 收到回复后停止后续节奏
          </label>
        </div>
        <label class="edit-block">话术
          <textarea class="admin-input edit-content-text" rows="6">${escapeHtml(step.content_text || '')}</textarea>
        </label>
        <div class="edit-block">
          <div style="font-size:13px;color:#5b626f;margin-bottom:6px;">图片（最多 9 张，从图片素材库选；发送前自动换企微 media_id）</div>
          <div class="edit-image-picker"></div>
          ${legacyMediaIds.length ? `<div style="font-size:11px;color:#a06400;margin-top:6px;">⚠️ 老数据带 ${legacyMediaIds.length} 个直接 media_id（${legacyMediaIds.map(m => escapeHtml(String(m).slice(0,8))+'…').join(', ')}），保存时会被覆盖。</div>` : ''}
        </div>
        <div class="edit-block">
          <div style="display:flex;align-items:center;gap:8px;">
            <span>小程序卡片（从素材库选；发送前自动换 media_id）</span>
            <button type="button" class="admin-button admin-button--ghost edit-pick-miniprogram" style="font-size:12px;">选择小程序</button>
            <span class="edit-miniprogram-summary" style="font-size:12px;color:#888;">已选 ${miniprogramLibraryIds.length} 个</span>
          </div>
          <div class="edit-miniprogram-list" style="display:flex;flex-direction:column;gap:6px;margin-top:6px;"></div>
          <input type="hidden" class="edit-miniprogram-ids" value='${JSON.stringify(miniprogramLibraryIds)}'>
        </div>
        <div class="edit-actions">
          <button class="admin-button admin-button--primary edit-save">保存</button>
          <button class="admin-button admin-button--ghost edit-cancel">取消</button>
        </div>
      </div>
    `;
    // 图片：用通用 image picker（multi 模式，最多 9 张）
    const imagePicker = window.mountImagePicker(rowEl.querySelector('.edit-image-picker'), {
      mode: 'multiple',
      max: 9,
      value: imageLibraryIds,
    });

    attachMiniprogramPicker(rowEl);
    rowEl.querySelector('.edit-cancel').addEventListener('click', () => {
      rowEl.innerHTML = originalHtml;
      rowEl.dataset.editing = '0';
      // 重新挂编辑按钮事件
      rowEl.querySelector('.cloud-camp-step-edit')?.addEventListener('click', () => loadDetail(currentCode));
    });
    rowEl.querySelector('.edit-save').addEventListener('click', async () => {
      let miniprogramIds = [];
      try { miniprogramIds = JSON.parse(rowEl.querySelector('.edit-miniprogram-ids').value || '[]'); } catch {}
      const body = {
        content_text: rowEl.querySelector('.edit-content-text').value,
        send_time: rowEl.querySelector('.edit-send-time').value || '10:00',
        day_offset: parseInt(rowEl.querySelector('.edit-day-offset').value || '0', 10),
        stop_on_reply: rowEl.querySelector('.edit-stop-on-reply').checked,
        image_library_ids: imagePicker.getValue(),
        // 显式清空老 image_media_ids，避免新老数据并存导致重复发图
        image_media_ids: [],
        miniprogram_library_ids: miniprogramIds,
      };
      const resp = await fetch(`/api/admin/cloud-orchestrator/campaigns/${encodeURIComponent(currentCode)}/steps/${encodeURIComponent(step.step_index)}`, {
        method: 'PATCH', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
      });
      const data = await resp.json();
      if (!data.ok) { alert('保存失败：' + (data.error || '')); return; }
      loadDetail(currentCode);
    });
  }

  // ----- members drawer -----
  let drawerCampCode = '';
  function openMembersDrawer(name) {
    drawerCampCode = currentCode;
    drawerTitle.textContent = `${name} · 成员明细`;
    drawerStatus.value = '';
    drawer.hidden = false;
    loadMembers();
  }
  function closeMembersDrawer() { drawer.hidden = true; }
  drawer.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', closeMembersDrawer));
  drawerStatus.addEventListener('change', loadMembers);
  async function loadMembers() {
    if (!drawerCampCode) return;
    drawerBody.textContent = '加载中…';
    const params = new URLSearchParams();
    if (drawerStatus.value) params.set('status', drawerStatus.value);
    params.set('limit', '200');
    const resp = await fetch(`/api/admin/cloud-orchestrator/campaigns/${encodeURIComponent(drawerCampCode)}/members?` + params.toString());
    const data = await resp.json();
    if (!data.ok) { drawerBody.textContent = '加载失败'; return; }
    drawerCount.textContent = `共 ${data.total} 人${data.rows.length < data.total ? `（仅展示前 ${data.rows.length} 人）` : ''}`;
    if (!data.rows.length) { drawerBody.textContent = '无成员'; return; }
    drawerBody.innerHTML = data.rows.map(r => {
      const tags = [];
      if (r.profile_segment_key) tags.push(escapeHtml(r.profile_segment_key));
      if (r.behavior_tier_key) tags.push(escapeHtml(r.behavior_tier_key));
      if (r.current_audience_code) tags.push(escapeHtml(r.current_audience_code));
      const detailUrl = r.external_contact_id ? `/admin/customers/${encodeURIComponent(r.external_contact_id)}` : '';
      return `
        <div class="cloud-camp-member-row">
          <div>
            <div><strong>${escapeHtml(r.phone || '(无手机号)')}</strong> <span class="cloud-orch-status-chip ${escapeHtml(r.status)}">${escapeHtml(r.status)}</span></div>
            <div class="cloud-camp-member-meta">
              <code>${escapeHtml(r.external_contact_id || '-')}</code>
              ${tags.length ? '· ' + tags.join(' / ') : ''}
              ${r.last_error_text ? `<br>错误：${escapeHtml(r.last_error_text)}` : ''}
            </div>
          </div>
          <div class="cloud-camp-member-action">
            ${detailUrl ? `<a href="${detailUrl}" target="_blank" rel="noopener">客户详情</a>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  refreshBtn.addEventListener('click', loadList);
  reviewSel.addEventListener('change', loadList);
  runSel.addEventListener('change', loadList);
  loadList();
})();
</script>
{% endblock %}
