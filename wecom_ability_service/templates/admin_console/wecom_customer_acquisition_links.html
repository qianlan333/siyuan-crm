{% extends "admin_console/base.html" %}

{% block content %}
<section class="admin-section">
  <div class="admin-section-header">
    <div>
      <h2 class="admin-section-title">新建绑定</h2>
      <p class="admin-section-summary">录入企业微信后台已存在的获客助手 link_id 和链接，系统会生成带 customer_channel 的投放链接。</p>
    </div>
  </div>
  <form class="admin-form-grid" data-wca-form>
    <label class="admin-form-field">
      <span>link_id</span>
      <input name="link_id" required placeholder="例如 lkxxxxxxxx">
    </label>
    <label class="admin-form-field">
      <span>link_url</span>
      <input name="link_url" required placeholder="https://work.weixin.qq.com/ca/...">
    </label>
    <label class="admin-form-field">
      <span>link_name</span>
      <input name="link_name" placeholder="投放名称">
    </label>
    <label class="admin-form-field">
      <span>program_id</span>
      <input name="program_id" type="number" min="1">
    </label>
    <label class="admin-form-field">
      <span>workflow_id</span>
      <input name="workflow_id" type="number" min="1">
    </label>
    <label class="admin-form-field">
      <span>初始人群</span>
      <select name="initial_audience_code">
        <option value="pending_questionnaire">待问卷</option>
        <option value="operating">运营中</option>
        <option value="converted">已转化</option>
      </select>
    </label>
    <div class="admin-form-actions">
      <button class="admin-button admin-button--primary" type="submit">保存绑定</button>
      <span class="admin-form-message" data-wca-message></span>
    </div>
  </form>
</section>

<section class="admin-section">
  <div class="admin-section-header">
    <div>
      <h2 class="admin-section-title">链接列表</h2>
      <p class="admin-section-summary">复制 final_url 用于投放；停用后回调只记录事件，不再入池。</p>
    </div>
    <button class="admin-button admin-button--secondary" type="button" data-wca-refresh>刷新</button>
  </div>
  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>名称</th>
          <th>link_id</th>
          <th>customer_channel</th>
          <th>final_url</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody data-wca-list>
        <tr><td colspan="6">加载中</td></tr>
      </tbody>
    </table>
  </div>
</section>
{% endblock %}

{% block scripts_extra %}
<script>
(() => {
  const listEl = document.querySelector("[data-wca-list]");
  const form = document.querySelector("[data-wca-form]");
  const messageEl = document.querySelector("[data-wca-message]");

  const escapeHtml = (value) => String(value || "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[char]));

  async function requestJson(url, options = {}) {
    const response = await fetch(url, {
      headers: {"Content-Type": "application/json"},
      ...options
    });
    const data = await response.json();
    if (!response.ok || !data.ok) throw new Error(data.error || "请求失败");
    return data;
  }

  async function loadLinks() {
    const data = await requestJson("/api/admin/wecom-customer-acquisition-links");
    const links = data.links || [];
    listEl.innerHTML = links.length ? links.map((item) => `
      <tr>
        <td>${escapeHtml(item.link_name || item.link_id)}</td>
        <td>${escapeHtml(item.link_id)}</td>
        <td><code>${escapeHtml(item.customer_channel)}</code></td>
        <td class="admin-table-url">${escapeHtml(item.final_url)}</td>
        <td>${escapeHtml(item.status)}</td>
        <td>
          <button class="admin-button admin-button--secondary" type="button" data-copy="${escapeHtml(item.final_url)}">复制</button>
          <button class="admin-button" type="button" data-toggle="${item.id}" data-status="${escapeHtml(item.status)}">
            ${item.status === "active" ? "禁用" : "启用"}
          </button>
        </td>
      </tr>
    `).join("") : `<tr><td colspan="6">暂无绑定</td></tr>`;
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    messageEl.textContent = "保存中";
    const payload = Object.fromEntries(new FormData(form).entries());
    try {
      await requestJson("/api/admin/wecom-customer-acquisition-links", {
        method: "POST",
        body: JSON.stringify(payload)
      });
      form.reset();
      messageEl.textContent = "已保存";
      await loadLinks();
    } catch (error) {
      messageEl.textContent = error.message;
    }
  });

  document.addEventListener("click", async (event) => {
    const copyUrl = event.target?.dataset?.copy;
    if (copyUrl) {
      await navigator.clipboard.writeText(copyUrl);
      messageEl.textContent = "final_url 已复制";
      return;
    }
    const rowId = event.target?.dataset?.toggle;
    if (rowId) {
      const action = event.target.dataset.status === "active" ? "disable" : "enable";
      await requestJson(`/api/admin/wecom-customer-acquisition-links/${rowId}/${action}`, {method: "POST"});
      await loadLinks();
    }
  });

  document.querySelector("[data-wca-refresh]").addEventListener("click", loadLinks);
  loadLinks().catch((error) => {
    listEl.innerHTML = `<tr><td colspan="6">${escapeHtml(error.message)}</td></tr>`;
  });
})();
</script>
{% endblock %}
